name: Criar APK NIEL IPTV
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3 devtools libncurses5 libncurses5-dev libncursesw5-dev libzip-dev zlib1g-dev libffi-dev libssl-dev    
          pip3 install --user --upgrade buildozer cython==0.29.33

      - name: Criar buildozer.spec
        run: |
          buildozer init
          sed -i 's/package.name = myapp/package.name = nieliptv/' buildozer.spec
          sed -i 's/title = My Application/title = NIEL IPTV PREMIUM/' buildozer.spec
          sed -i 's/# android.permissions = INTERNET/android.permissions = INTERNET,ACCESS_NETWORK_STATE/' buildozer.spec
          sed -i 's/android.api = 31/android.api = 30/' buildozer.spec

      - name: Fabricar o APK
        run: |
          export APP_ALLOW_ROOT=1
          yes | buildozer -v android debug

      - name: Upload do APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: NIEL-IPTV-INSTALADOR
          path: bin/*.apk
