<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIEL REALSENSI - OFICIAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #050505;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: 
                linear-gradient(135deg, rgba(13, 13, 13, 0.92), rgba(13, 13, 13, 0.92)),
                url('https://i.ibb.co/ym3t7Jpf/fundo-vip.png') center/cover no-repeat;
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.4);
            max-width: 480px;
            width: 100%;
            padding: 35px;
            border: 1px solid #222;
            text-align: center;
        }
        .top-image {
            width: 100%;
            max-width: 200px;
            height: auto;
            margin: 0 auto 25px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }
        .bottom-image {
            width: 100%;
            max-width: 200px;
            height: auto;
            margin: 25px auto 0;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }
        .neon-title {
            font-size: 34px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2, 0 0 40px #8a2be2;
            animation: glow 1.5s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2, 0 0 30px #8a2be2; }
            to { text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff, 0 0 60px #ff00ff; }
        }
        .section { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }
        select {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }
        select:focus { border-color: #8a2be2; }
        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #8a2be2, #ff00ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .result-box {
            background: #151515;
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid #8a2be2;
            display: none;
        }
        .sensi-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }
        .s-name { color: #aaa; font-size: 14px; font-weight: 600; }
        .s-val { color: #00ff00; font-weight: 900; font-size: 20px; }
        .dpi-card {
            background: #222;
            color: #ff00ff;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 900;
            border: 1px dashed #ff00ff;
        }
        .timer-info {
            font-size: 11px;
            color: #ffcc00;
            margin-top: 10px;
            font-weight: bold;
        }
        .btn-copy {
            width: 100%;
            padding: 15px;
            background: #333;
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- IMAGEM DO TOPO -->
    <img src="https://i.ibb.co/ym3t7Jpf/fundo-vip.png" alt="NIEL VIP" class="top-image">
    
    <div class="neon-title">NIEL REALSENSI</div>
    
    <div class="section">
        <label>Selecione a Marca</label>
        <select id="brand" onchange="loadModels()">
            <option value="">Escolha uma marca...</option>
            <option value="samsung">SAMSUNG</option>
            <option value="motorola">MOTOROLA</option>
            <option value="xiaomi">XIAOMI / POCO</option>
            <option value="apple">APPLE (iPhone)</option>
            <option value="infinix">INFINIX</option>
            <option value="realme">REALME</option>
        </select>
    </div>

    <div class="section">
        <label>Modelo do Aparelho</label>
        <select id="model">
            <option value="">Aguardando marca...</option>
        </select>
    </div>

    <button class="btn-generate" onclick="generateSensi()">Gerar Sensibilidade VIP</button>

    <div id="resultBox" class="result-box">
        <div class="sensi-item"><span class="s-name">GERAL</span><span class="s-val" id="res-g">0</span></div>
        <div class="sensi-item"><span class="s-name">PONTO VERMELHO</span><span class="s-val" id="res-r">0</span></div>
        <div class="sensi-item"><span class="s-name">MIRA 2X</span><span class="s-val" id="res-2">0</span></div>
        <div class="sensi-item"><span class="s-name">MIRA 4X</span><span class="s-val" id="res-4">0</span></div>
        <div class="sensi-item"><span class="s-name">MIRA AWM</span><span class="s-val" id="res-a">0</span></div>
        <div class="sensi-item"><span class="s-name">CÂMERA LIVRE</span><span class="s-val" id="res-c">0</span></div>
        
        <div class="dpi-card" id="res-dpi">DPI RECOMENDADA: 0</div>
        <div id="timer" class="timer-info"></div>
        
        <button class="btn-copy" onclick="copyConfig()">📋 COPIAR CONFIGURAÇÃO</button>
        
        <!-- IMAGEM DO RODAPÉ -->
        <img src="https://i.ibb.co/ym3t7Jpf/fundo-vip.png" alt="NIEL VIP" class="bottom-image">
    </div>
</div>

<script>
    const database = {
        samsung: ["Galaxy A01", "Galaxy A10s", "Galaxy A11", "Galaxy A12", "Galaxy A20s", "Galaxy A21s", "Galaxy A22", "Galaxy A30s", "Galaxy A31", "Galaxy A32", "Galaxy A50", "Galaxy A51", "Galaxy A52", "Galaxy A53", "Galaxy A54", "Galaxy S20 FE", "Galaxy S21", "Galaxy S23 Ultra"],
        motorola: ["Moto E7", "Moto G8 Play", "Moto G9 Plus", "Moto G22", "Moto G30", "Moto G60", "Moto G73", "Moto Edge 30"],
        xiaomi: ["Redmi 9", "Redmi 10", "Redmi 12", "Redmi Note 10", "Redmi Note 11", "Redmi Note 12", "Poco X3 Pro", "Poco X5 Pro", "Poco F5"],
        apple: ["iPhone 8 Plus", "iPhone X", "iPhone 11", "iPhone 12", "iPhone 13", "iPhone 14", "iPhone 15 Pro Max"],
        infinix: ["Hot 11", "Hot 20i", "Hot 30i", "Note 30"],
        realme: ["Realme 7", "Realme 8 Pro", "Realme 9i", "Realme C55"]
    };

    function loadModels() {
        const brand = document.getElementById('brand').value;
        const mSelect = document.getElementById('model');
        mSelect.innerHTML = brand ? '' : '<option>Aguardando marca...</option>';
        if(brand) {
            database[brand].forEach(m => {
                mSelect.innerHTML += `<option value="${m}">${m}</option>`;
            });
        }
        document.getElementById('resultBox').style.display = 'none';
    }

    function generateSensi() {
        const model = document.getElementById('model').value;
        if(!model || model.includes("Aguardando")) return alert("⚠️ Selecione um modelo!");

        const agora = new Date().getTime();
        const tempoEspera = 8 * 60 * 60 * 1000; // 8 Horas
        
        let registro = JSON.parse(localStorage.getItem('sensi_' + model));

        // Se já gerou e não passou 8 horas, mantém a mesma
        if (registro && (agora - registro.dataGerada < tempoEspera)) {
            exibirSensi(registro.valores);
            const falta = tempoEspera - (agora - registro.dataGerada);
            const horasFalta = Math.floor(falta / (1000 * 60 * 60));
            const minutosFalta = Math.floor((falta % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('timer').innerText = `⏳ Próxima atualização em: ${horasFalta}h ${minutosFalta}min`;
        } else {
            // Gera novos valores baseados no modelo + janela de tempo
            let seed = 0;
            for (let i = 0; i < model.length; i++) { seed += model.charCodeAt(i); }
            seed += Math.floor(agora / tempoEspera); // Muda a cada 8h

            const getVal = (min, max, offset) => ((seed * offset) % (max - min + 1)) + min;

            let novosValores = {
                g: getVal(188, 200, 3),
                r: getVal(182, 196, 7),
                m2: getVal(192, 200, 4),
                m4: getVal(188, 200, 2),
                awm: getVal(40, 60, 9),
                cam: getVal(160, 200, 5),
                dpi: (seed % 2 === 0) ? "720" : "600"
            };

            if(model.toLowerCase().includes("s") || model.toLowerCase().includes("pro")) {
                novosValores.dpi = (parseInt(novosValores.dpi) + 100).toString();
            }

            localStorage.setItem('sensi_' + model, JSON.stringify({
                dataGerada: agora,
                valores: novosValores
            }));

            exibirSensi(novosValores);
            document.getElementById('timer').innerText = "🔥 SENSIBILIDADE ATUALIZADA AGORA!";
            alert("✅ Nova Sensibilidade Gerada!");
        }
    }

    function exibirSensi(v) {
        document.getElementById('res-g').innerText = v.g;
        document.getElementById('res-r').innerText = v.r;
        document.getElementById('res-2').innerText = v.m2;
        document.getElementById('res-4').innerText = v.m4;
        document.getElementById('res-a').innerText = v.awm;
        document.getElementById('res-c').innerText = v.cam;
        document.getElementById('res-dpi').innerText = "DPI RECOMENDADA: " + v.dpi;
        document.getElementById('resultBox').style.display = 'block';
    }

    async function copyConfig() {
        const model = document.getElementById('model').value;
        const texto = `💎 NIEL REALSENSI 💎\n📱 DISPOSITIVO: ${model}\n\nGERAL: ${document.getElementById('res-g').innerText}\nRED DOT: ${document.getElementById('res-r').innerText}\nMIRA 2X: ${document.getElementById('res-2').innerText}\nMIRA 4X: ${document.getElementById('res-4').innerText}\n${document.getElementById('res-dpi').innerText}\nBOTÃO: 47%`;
        
        try {
            await navigator.clipboard.writeText(texto);
            alert("✅ Configuração Copiada!");
        } catch (err) {
            alert("Erro ao copiar.");
        }
    }
</script>

</body>
</html>
