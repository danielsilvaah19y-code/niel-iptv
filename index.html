<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIEL REALSENSI PRO - OFICIAL</title>
  <meta name="description" content="Gerador oficial de sensibilidade PRO para Free Fire Max" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap");

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px 15px;
    }

    .container {
      background: rgba(15, 15, 25, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      box-shadow: 0 32px 80px -20px rgba(0, 0, 0, 0.7);
      max-width: 520px;
      width: 100%;
      padding: 48px 40px 80px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .header { text-align: center; margin-bottom: 40px; }
    .logo { width: 100%; max-width: 200px; margin: 0 auto 24px; border-radius: 20px; filter: drop-shadow(0 20px 40px rgba(102, 126, 234, 0.4)); }

    .title { font-family: "Orbitron", monospace; font-size: 36px; font-weight: 900; background: linear-gradient(135deg, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { font-size: 16px; color: #a0a0cc; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }

    .history-btn {
      position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.15);
      border: none; color: white; font-size: 24px; width: 50px; height: 50px;
      border-radius: 50%; cursor: pointer;
    }

    .label { font-size: 14px; color: #b0b0d0; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; display: block; }

    select {
      width: 100%; padding: 20px 24px; background: rgba(30,30,50,0.8); 
      border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; 
      color: white; font-size: 16px; font-weight: 600; margin-bottom: 24px;
    }

    .btn {
      width: 100%; padding: 22px; border: none; border-radius: 24px;
      color: white; font-family: "Orbitron", monospace; font-weight: 800; 
      font-size: 18px; cursor: pointer; text-transform: uppercase; margin-top: 12px;
      transition: all 0.3s;
    }

    .btn-generate { background: linear-gradient(135deg, #667eea, #764ba2); }
    .btn-save { background: linear-gradient(135deg, #10b981, #34d399); }
    .btn-copy { background: linear-gradient(135deg, #8b5cf6, #c026d3); }

    .result-box {
      background: rgba(25,25,45,0.95); border-radius: 24px; padding: 36px; 
      margin-top: 36px; border: 2px solid #4facfe; display: none;
    }
    .result-box.show { display: block; }

    .sensi-item { display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .s-name { color: #b0b0d0; font-weight: 600; }
    .s-val { color: #00f2fe; font-family: "Orbitron", monospace; font-weight: 900; font-size: 28px; }

    .dpi-card { background: rgba(79,172,254,0.15); padding: 24px; border-radius: 20px; margin-top: 28px; text-align: center; border: 1px solid #4facfe; font-weight: 700; font-size: 18px; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: white; padding: 14px 24px; border-radius: 9999px;
      z-index: 1000; opacity: 0; transition: all 0.4s; display: none;
    }

    .timer { text-align: center; margin: 20px 0; color: #10b981; font-weight: 700; font-size: 15px; }

    /* Modal Nome */
    #nameModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 3000; justify-content: center; align-items: center; }
    .name-modal-content { background: #1a1a2e; width: 90%; max-width: 420px; border-radius: 24px; padding: 30px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://i.ibb.co/ym3t7Jpf/fundo-vip.png" alt="Logo" class="logo" />
      <h1 class="title">NIEL REALSENSI</h1>
      <div class="subtitle">VERSÃO PRO • OFICIAL</div>
    </div>

    <button class="history-btn" onclick="showHistory()">📜</button>

    <label class="label">🔥 Selecione a Marca</label>
    <select id="brand">
      <option value="">Escolha uma marca...</option>
      <option value="samsung">SAMSUNG</option>
      <option value="motorola">MOTOROLA</option>
      <option value="xiaomi">XIAOMI / POCO</option>
      <option value="apple">APPLE (iPhone)</option>
      <option value="realme">REALME</option>
      <option value="infinix">INFINIX</option>
      <option value="lg">LG</option>
      <option value="zte">ZTE / NUBIA</option>
      <option value="oppo">OPPO</option>
      <option value="vivo">VIVO</option>
      <option value="huawei">HUAWEI / HONOR</option>
      <option value="asus">ASUS</option>
      <option value="google">GOOGLE PIXEL</option>
      <option value="oneplus">ONEPLUS</option>
      <option value="sony">SONY XPERIA</option>
      <option value="tecno">TECNO</option>
      <option value="lenovo">LENOVO</option>
      <option value="nokia">NOKIA</option>
      <option value="positivo">POSITIVO</option>
      <option value="multilaser">MULTILASER</option>
    </select>

    <label class="label">📱 Modelo do Aparelho</label>
    <select id="model" disabled><option value="">Aguardando marca...</option></select>

    <button class="btn btn-generate" id="generateBtn">⚡ Gerar Sensibilidade PRO</button>

    <div id="resultBox" class="result-box">
      <h2 id="res-model" style="text-align:center; margin-bottom:24px; color:#67e8f9;">📱</h2>

      <div class="sensi-item"><span class="s-name">GERAL</span><span class="s-val" id="res-g">0</span></div>
      <div class="sensi-item"><span class="s-name">PONTO VERMELHO</span><span class="s-val" id="res-r">0</span></div>
      <div class="sensi-item"><span class="s-name">MIRA 2X</span><span class="s-val" id="res-2">0</span></div>
      <div class="sensi-item"><span class="s-name">MIRA 4X</span><span class="s-val" id="res-4">0</span></div>
      <div class="sensi-item"><span class="s-name">MIRA AWM</span><span class="s-val" id="res-a">0</span></div>
      <div class="sensi-item"><span class="s-name">CÂMERA LIVRE</span><span class="s-val" id="res-c">0</span></div>

      <div class="dpi-card" id="res-dpi">DPI RECOMENDADA: 0</div>
      <div id="timer" class="timer">⏳ Aguarde...</div>

      <button class="btn btn-save" onclick="openSaveModal()">💾 Salvar no Histórico</button>
      <button class="btn btn-copy" onclick="copyConfig()">📋 Copiar Configuração PRO</button>
    </div>
  </div>

  <!-- Modal Nome -->
  <div id="nameModal">
    <div class="name-modal-content">
      <h2>Salvar Sensibilidade</h2>
      <p style="margin:15px 0; color:#ccc;">Dê um nome para esta sensi:</p>
      <input type="text" id="sensiName" placeholder="Ex: Headshot A15" style="margin-bottom:20px;">
      <button onclick="saveWithName()" style="background:#22c55e; padding:14px; width:48%; border:none; border-radius:12px; color:white;">Salvar</button>
      <button onclick="closeNameModal()" style="background:#666; padding:14px; width:48%; border:none; border-radius:12px; color:white;">Cancelar</button>
    </div>
  </div>

  <!-- Modal Histórico -->
  <div id="historyModal" class="modal">
    <div class="modal-content">
      <h2 style="text-align:center; margin-bottom:20px;">📜 Histórico de Sensibilidades</h2>
      <button onclick="exportHistory()" style="background:#3b82f6; width:100%; padding:12px; margin-bottom:8px;">📤 Exportar Histórico</button>
      <button onclick="document.getElementById('importInput').click()" style="background:#64748b; width:100%; padding:12px; margin-bottom:15px;">📥 Importar Histórico</button>
      <input type="file" id="importInput" accept=".json" style="display:none;" onchange="importHistory(event)">
      
      <button onclick="clearAllHistory()" style="background:#ef4444; width:100%; padding:12px; border:none; border-radius:12px; color:white; margin-bottom:15px;">🗑️ Limpar Todo Histórico</button>
      <div id="historyList"></div>
      <button onclick="closeHistory()" style="margin-top:20px; background:#555; width:100%; padding:14px; border:none; border-radius:12px; color:white;">Fechar</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ==================== DATABASE ====================
    const database = {
      samsung: { modelos: ["Galaxy A01","Galaxy A02","Galaxy A03","Galaxy A04","Galaxy A05","Galaxy A06","Galaxy A10","Galaxy A10s","Galaxy A11","Galaxy A12","Galaxy A13","Galaxy A14","Galaxy A15","Galaxy A16","Galaxy A20","Galaxy A20s","Galaxy A21","Galaxy A21s","Galaxy A22","Galaxy A23","Galaxy A24","Galaxy A25","Galaxy A30","Galaxy A30s","Galaxy A31","Galaxy A32","Galaxy A33","Galaxy A34","Galaxy A35","Galaxy A50","Galaxy A51","Galaxy A52","Galaxy A53","Galaxy A54","Galaxy A55","Galaxy S20 FE","Galaxy S21","Galaxy S23","Galaxy S23 Ultra","Galaxy S24","Galaxy S24 Ultra"], base: { g: 175, r: 170, m2: 168, m4: 165, awm: 45, cam: 155, dpi: 720 }},
      motorola: { modelos: ["Moto E7","Moto E13","Moto E22","Moto G05","Moto G06","Moto G8 Play","Moto G9 Play","Moto G10","Moto G15","Moto G20","Moto G22","Moto G23","Moto G24","Moto G30","Moto G32","Moto G35","Moto G42","Moto G52","Moto G54","Moto G55","Moto G56","Moto G60","Moto G73","Moto G75","Moto G84","Moto G85","Moto G86","Moto Edge 30","Moto Edge 40"], base: { g: 170, r: 165, m2: 162, m4: 160, awm: 42, cam: 150, dpi: 700 }},
      xiaomi: { modelos: ["Redmi 9","Redmi 9A","Redmi 10","Redmi 12","Redmi 12C","Redmi 13C","Redmi 14C","Redmi 15C","Redmi Note 8","Redmi Note 9","Redmi Note 10","Redmi Note 11","Redmi Note 12","Redmi Note 13","Redmi Note 13 Pro","Redmi Note 14","Redmi Note 14 Pro","Poco X3 Pro","Poco X5 Pro","Poco X6 Pro","Poco X7 Pro","Poco F5","Poco F6"], base: { g: 180, r: 175, m2: 172, m4: 170, awm: 48, cam: 160, dpi: 800 }},
      realme: { modelos: ["Realme 7","Realme 7 Pro","Realme 8","Realme 8 Pro","Realme 9","Realme 9i","Realme 10","Realme 11","Realme 14 Pro+","Realme 15T","Realme C11","Realme C21","Realme C33","Realme C35","Realme C53","Realme C55","Realme C61","Realme C63","Realme C71","Realme C75","Realme Narzo 50","Realme Narzo 60"], base: { g: 178, r: 172, m2: 170, m4: 168, awm: 46, cam: 158, dpi: 780 }},
      infinix: { modelos: ["Hot 10","Hot 11","Hot 12","Hot 20i","Hot 30i","Hot 40i","Note 12","Note 30","Note 30 Pro","Zero 5G","Zero 30"], base: { g: 172, r: 168, m2: 165, m4: 162, awm: 44, cam: 152, dpi: 760 }},
      lg: { modelos: ["LG K8","LG K9","LG K10","LG K11","LG K12","LG K20","LG K22","LG K30","LG K31","LG K32","LG K40","LG K41","LG K42","LG K50","LG K51","LG K52","LG K61","LG Stylo 6","LG Velvet","LG Wing"], base: { g: 168, r: 163, m2: 160, m4: 158, awm: 40, cam: 148, dpi: 650 }},
      apple: { modelos: ["iPhone 8","iPhone 8 Plus","iPhone X","iPhone 11","iPhone 12","iPhone 13","iPhone 14","iPhone 15","iPhone 15 Pro Max","iPhone 16","iPhone 16 Pro Max"], base: { g: 185, r: 180, m2: 178, m4: 175, awm: 50, cam: 165, dpi: 880 }},
      oppo: { modelos: ["Oppo A15","Oppo A16","Oppo A17","Oppo A31","Oppo A53","Oppo A54","Oppo A74","Oppo A76","Oppo A77","Oppo A78"], base: { g: 176, r: 171, m2: 169, m4: 166, awm: 44, cam: 156, dpi: 800 }},
      vivo: { modelos: ["Vivo Y11","Vivo Y12","Vivo Y15","Vivo Y20","Vivo Y21","Vivo Y22","Vivo Y33","Vivo Y35","Vivo Y55"], base: { g: 173, r: 168, m2: 165, m4: 163, awm: 42, cam: 153, dpi: 780 }},
      huawei: { modelos: ["Huawei P30","Huawei P40","Huawei P50","Huawei P60","Huawei Mate 20","Huawei Mate 40"], base: { g: 177, r: 172, m2: 170, m4: 167, awm: 45, cam: 157, dpi: 850 }}
    };

    const brandSelect = document.getElementById('brand');
    const modelSelect = document.getElementById('model');
    const generateBtn = document.getElementById('generateBtn');
    const resultBox = document.getElementById('resultBox');
    const timerEl = document.getElementById('timer');
    const toastEl = document.getElementById('toast');

    let timerInterval = null;
    let cooldownEndTime = null;
    const MAX_HISTORY = 40;

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.style.display = "block";
      toastEl.style.opacity = "1";
      setTimeout(() => { toastEl.style.opacity = "0"; setTimeout(() => toastEl.style.display = "none", 400); }, 2800);
    }

    // ==================== MODAL NOME ====================
    function openSaveModal() {
      if (!modelSelect.value) return showToast("❌ Selecione marca e modelo primeiro");
      document.getElementById('sensiName').value = `Sensi ${modelSelect.value}`;
      document.getElementById('nameModal').style.display = 'flex';
    }

    function closeNameModal() {
      document.getElementById('nameModal').style.display = 'none';
    }

    function saveWithName() {
      const name = document.getElementById('sensiName').value.trim() || `Sensi ${modelSelect.value}`;
      closeNameModal();

      const sensi = {
        id: Date.now(),
        name: name,
        date: new Date().toLocaleString('pt-BR'),
        model: modelSelect.value,
        g: document.getElementById("res-g").innerText,
        r: document.getElementById("res-r").innerText,
        m2: document.getElementById("res-2").innerText,
        m4: document.getElementById("res-4").innerText,
        awm: document.getElementById("res-a").innerText,
        cam: document.getElementById("res-c").innerText,
        dpi: document.getElementById("res-dpi").innerText.replace('DPI RECOMENDADA: ', '')
      };

      let history = JSON.parse(localStorage.getItem('sensiHistory') || '[]');
      history.unshift(sensi);
      if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
      localStorage.setItem('sensiHistory', JSON.stringify(history));
      showToast(`✅ "${name}" salva!`);
    }

    // ==================== HISTÓRICO ====================
    function showHistory() {
      const history = JSON.parse(localStorage.getItem('sensiHistory') || '[]');
      const list = document.getElementById('historyList');
      list.innerHTML = history.length === 0 ? '<p style="text-align:center;padding:40px;color:#777;">Nenhuma sensibilidade salva ainda.</p>' : '';

      history.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div style="font-size:13px;color:#aaa;">${item.date}</div>
          <strong>${item.name}</strong> <small>(${item.model})</small><br>
          <small>G:${item.g} | R:${item.r} | 2X:${item.m2} | DPI:${item.dpi}</small><br><br>
          <button onclick="loadFromHistory(${item.id})" style="background:#22c55e;padding:8px 14px;border:none;border-radius:8px;margin-right:8px;">Carregar</button>
          <button onclick="deleteHistoryItem(${item.id})" style="background:#ef4444;padding:8px 14px;border:none;border-radius:8px;">Excluir</button>
        `;
        list.appendChild(div);
      });
      document.getElementById('historyModal').style.display = 'flex';
    }

    function loadFromHistory(id) {
      const history = JSON.parse(localStorage.getItem('sensiHistory') || '[]');
      const item = history.find(h => h.id === id);
      if (item) {
        document.getElementById("res-model").innerText = "📱 " + item.model;
        document.getElementById("res-g").innerText = item.g;
        document.getElementById("res-r").innerText = item.r;
        document.getElementById("res-2").innerText = item.m2;
        document.getElementById("res-4").innerText = item.m4;
        document.getElementById("res-a").innerText = item.awm;
        document.getElementById("res-c").innerText = item.cam;
        document.getElementById("res-dpi").innerText = `DPI RECOMENDADA: ${item.dpi}`;
        resultBox.classList.add("show");
      }
      closeHistory();
    }

    function deleteHistoryItem(id) {
      let history = JSON.parse(localStorage.getItem('sensiHistory') || '[]');
      history = history.filter(item => item.id !== id);
      localStorage.setItem('sensiHistory', JSON.stringify(history));
      showHistory();
    }

    function clearAllHistory() {
      if (confirm("Apagar todo o histórico?")) {
        localStorage.removeItem('sensiHistory');
        showHistory();
      }
    }

    function closeHistory() {
      document.getElementById('historyModal').style.display = 'none';
    }

    // ==================== GERAÇÃO COM CARREGAMENTO ====================
    function generateSensi() {
      const brand = brandSelect.value;
      const model = modelSelect.value;
      if (!brand || !model) return showToast("❌ Selecione marca e modelo!");

      // Carregamento visual
      const originalText = generateBtn.textContent;
      generateBtn.innerHTML = `⚡ Gerando...`;
      generateBtn.disabled = true;

      const agora = Date.now();
      const stored = JSON.parse(localStorage.getItem(`cooldown_${model}`));
      if (stored && agora < stored.end) {
        cooldownEndTime = stored.end;
        startRealTimeTimer();
        generateBtn.textContent = originalText;
        generateBtn.disabled = false;
        showToast("⏳ Ainda em cooldown!");
        return;
      }

      cooldownEndTime = agora + (5 * 60 * 1000);
      startRealTimeTimer();

      setTimeout(() => {
        const base = database[brand].base;
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const v = {
          g: base.g + rand(-13,13),
          r: base.r + rand(-13,13),
          m2: base.m2 + rand(-15,14),
          m4: base.m4 + rand(-15,14),
          awm: base.awm + rand(-8,9),
          cam: base.cam + rand(-12,13),
          dpi: base.dpi + rand(-40,45)
        };

        v.g = Math.max(158, Math.min(208, v.g));
        v.r = Math.max(152, Math.min(200, v.r));
        v.m2 = Math.max(145, Math.min(200, v.m2));
        v.m4 = Math.max(142, Math.min(198, v.m4));
        v.awm = Math.max(30, Math.min(75, v.awm));
        v.cam = Math.max(132, Math.min(188, v.cam));
        v.dpi = Math.round(v.dpi / 10) * 10;

        exibirResultados(v, model);
        localStorage.setItem(`cooldown_${model}`, JSON.stringify({ end: cooldownEndTime }));
        showToast("✅ Sensibilidade gerada!");

        generateBtn.textContent = "⚡ Gerar Sensibilidade PRO";
        generateBtn.disabled = false;
      }, 1300);
    }

    function exibirResultados(v, model) {
      document.getElementById("res-model").innerText = "📱 " + model;
      document.getElementById("res-g").innerText = v.g;
      document.getElementById("res-r").innerText = v.r;
      document.getElementById("res-2").innerText = v.m2;
      document.getElementById("res-4").innerText = v.m4;
      document.getElementById("res-a").innerText = v.awm;
      document.getElementById("res-c").innerText = v.cam;
      document.getElementById("res-dpi").innerText = `DPI RECOMENDADA: ${v.dpi}`;
      resultBox.classList.add("show");
    }

    function startRealTimeTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        const restante = cooldownEndTime - Date.now();
        if (restante <= 0) {
          timerEl.innerHTML = "✅ Pode gerar novamente!";
          generateBtn.textContent = "⚡ Gerar Sensibilidade PRO";
          generateBtn.disabled = false;
          clearInterval(timerInterval);
          return;
        }
        const minutos = Math.floor((restante % 3600000) / 60000);
        const segundos = Math.floor((restante % 60000) / 1000);
        timerEl.innerHTML = `⏰ Aguarde: <strong>${minutos}m ${segundos}s</strong>`;
        generateBtn.textContent = `Aguarde ${minutos}m ${segundos}s`;
      }, 1000);
    }

    function copyConfig() {
      const model = modelSelect.value;
      const texto = `⚡ NIEL REALSENSI PRO\n📱 ${model}\n\nGERAL: ${document.getElementById("res-g").innerText}\nRED DOT: ${document.getElementById("res-r").innerText}\n2X: ${document.getElementById("res-2").innerText}\n4X: ${document.getElementById("res-4").innerText}\nAWM: ${document.getElementById("res-a").innerText}\nCÂMERA: ${document.getElementById("res-c").innerText}\n${document.getElementById("res-dpi").innerText}`;
      navigator.clipboard.writeText(texto).then(() => showToast("✅ Copiado!"));
    }

    function loadModels() {
      const brand = brandSelect.value;
      modelSelect.innerHTML = '<option value="">Selecione o modelo...</option>';
      modelSelect.disabled = !brand;
      if (brand && database[brand]) {
        database[brand].modelos.sort().forEach(m => {
          modelSelect.innerHTML += `<option value="${m}">${m}</option>`;
        });
      }
      resultBox.classList.remove('show');
    }

    // Inicialização
    brandSelect.addEventListener("change", loadModels);
    generateBtn.addEventListener("click", generateSensi);

    setTimeout(() => showToast("👋 Selecione marca e modelo para começar!"), 800);
  </script>
</body>
</html>
