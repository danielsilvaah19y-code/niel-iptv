  <style>
    :root{--red:#ff0000;--bg:#0a0a0a;--card:#151515;--accent:#00d2ff;--green:#28a745}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:#fff;font-family:Arial;padding-bottom:20px}
    header{padding:15px;background:#000;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:10;text-align:center}
    .logo{font-weight:900;color:var(--accent);font-size:24px;margin-bottom:10px}
    .search-box input{width:90%;max-width:400px;padding:12px;border-radius:25px;border:1px solid #333;background:#111;color:#fff;outline:none}
    
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:15px}
    .card{background:var(--card);border-radius:12px;padding:12px;text-align:center;border:1px solid #222;display:flex;flex-direction:column;gap:8px}
    .name{font-size:12px;font-weight:bold;color:#eee;height:35px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .play{background:var(--red);color:#fff;border:none;padding:10px;border-radius:6px;font-weight:800;cursor:pointer;font-size:11px}
    .direct{background:var(--green);color:#fff;text-decoration:none;padding:8px;border-radius:6px;font-size:10px;font-weight:bold}
    
    #modal{position:fixed;inset:0;display:none;background:#000;z-index:9999;flex-direction:column}
    #modal.open{display:flex}
    .controls{display:flex;justify-content:space-between;background:#222;padding:10px}
    .btn-top{padding:10px;border-radius:5px;cursor:pointer;font-weight:bold;font-size:12px;color:#fff}
    .close-btn{background:var(--red)}
    .fs-btn{background:var(--accent);color:#000}
    video{width:100%;height:100%;background:#000}
    @media(min-width:900px){.grid{grid-template-columns:repeat(5,1fr)}}
  </style>
</head>

</header>

  const video = document.getElementById('video');
  const hls = new Hls();

  // Função que transforma o texto da lista em botões automaticamente
  function buildList() {
    const list = document.getElementById('list');
    const lines = listaM3U.split('\n');
    
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes('#EXTINF')) {
        let name = lines[i].split(',')[1] || "Canal";
        let url = lines[i+1]?.trim();
        
        if (url && url.startsWith('http')) {
          list.innerHTML += `
            <div class="card" data-name="${name.toLowerCase()}">
              <div class="name">${name}</div>
              <button class="play" onclick="play('${url}')">ASSISTIR</button>
              <a href="${url}" target="_blank" class="direct">ABRIR DIRETO</a>
            </div>`;
        }
      }
    }
  }

  function play(url) {
    document.getElementById('modal').classList.add('open');
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
    if (Hls.isSupported()) {
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else {
      video.src = url;
      video.play();
    }
  }

  function toggleFS() {
    const modal = document.getElementById('modal');
    if (!document.fullscreenElement) modal.requestFullscreen();
    else document.exitFullscreen();
  }

  function closeP() {
    document.getElementById('modal').classList.remove('open');
    video.pause();
    hls.detachMedia();
    if (document.fullscreenElement) document.exitFullscreen();
  }

  function filter() {
    let q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
      c.style.display = c.dataset.name.includes(q) ? "" : "none";
    });
  }

  // Inicia a construção da lista ao carregar a página
  buildList();
