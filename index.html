<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https: data:;">
  <title>NIEL REALSENSI PRO - OFICIAL</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap");

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      background-image: url('https://i.ibb.co/WNg5B4qF/image-31e568da.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* ==================== ANIMAÇÕES ====================*/
    @keyframes pulse { 
      0%, 100% { transform: scale(1); } 
      50% { transform: scale(1.06); } 
    }

    @keyframes logoGlow { 
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ==================== TELA DE ENTRADA ==================== */
    #entry-screen {
      position: fixed; inset: 0;
      background: rgba(10, 10, 20, 0.78);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.8s ease;
    }

    .entry-content { text-align: center; max-width: 420px; width: 92%; }

    .eagle-entry, .logo-abaixo {
      width: 100%; max-width: 390px; margin: 0 auto 25px;
      filter: drop-shadow(0 25px 50px rgba(139, 92, 246, 0.9));
      animation: pulse 2s infinite;
    }
    .logo-abaixo { max-width: 380px; margin-top: 40px; filter: drop-shadow(0 25px 50px rgba(0, 242, 254, 0.75)); }

    .entry-title {
      font-family: "Orbitron", monospace; font-size: 44px; font-weight: 900;
      background: linear-gradient(135deg, #4facfe, #00f2fe, #c026d3);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px; letter-spacing: 3px;
    }

    .entry-subtitle { font-size: 25px; font-weight: 700; color: #a0a0cc; letter-spacing: 4px; margin-bottom: 40px; }

    #enter-btn {
      background: linear-gradient(135deg, #00f2fe, #00b8d4); color: #000;
      border: none; padding: 22px 85px; font-family: "Orbitron", monospace;
      font-size: 23px; font-weight: 900; text-transform: uppercase;
      border-radius: 50px; cursor: pointer; box-shadow: 0 15px 45px rgba(0, 242, 254, 0.65);
      transition: all 0.4s; letter-spacing: 2px; margin: 15px 0 25px;
    }
    #enter-btn:hover { transform: scale(1.08); box-shadow: 0 22px 60px rgba(0, 242, 254, 0.85); }

    #main-app { display: none; padding: 20px 15px; }

    .container {
      background: rgba(15, 15, 25, 0.95); backdrop-filter: blur(30px);
      border-radius: 32px; box-shadow: 0 32px 80px -20px rgba(0,0,0,0.7);
      max-width: 520px; width: 100%; padding: 48px 40px 40px;
      border: 1px solid rgba(255,255,255,0.1); position: relative; margin: 0 auto;
    }

    .header { text-align: center; margin-bottom: 40px; }

    /* Logo pequena - Efeito diferente */
    .logo { 
      width: 100%; max-width: 200px; margin: 0 auto 24px; border-radius: 20px; 
      filter: drop-shadow(0 15px 35px rgba(102, 126, 234, 0.6));
      animation: logoGlow 4s infinite ease-in-out;
    }

    /* Logo grande - Pulse normal */
    .eagle-logo { 
      display: block; width: 100%; max-width: 380px; margin: 45px auto 20px;
      border-radius: 20px; filter: drop-shadow(0 25px 50px rgba(139, 92, 246, 0.7));
      animation: pulse 3s infinite;
    }

    .title { 
      font-family: "Orbitron", monospace; font-size: 36px; font-weight: 900;
      background: linear-gradient(135deg, #4facfe, #00f2fe); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; 
    }
    
    .subtitle { 
      font-size: 16px; color: #a0a0cc; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; 
    }

    .history-btn {
      position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.15);
      border: none; color: white; font-size: 24px; width: 50px; height: 50px;
      border-radius: 50%; cursor: pointer; transition: all 0.3s;
    }

    .history-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
    }

    .label { 
      font-size: 14px; color: #b0b0d0; margin-bottom: 12px; font-weight: 600; 
      text-transform: uppercase; display: block; 
    }

    select {
      width: 100%; padding: 20px 24px; background: rgba(30,30,50,0.8); 
      border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; 
      color: white; font-size: 16px; font-weight: 600; margin-bottom: 24px;
      transition: all 0.3s;
      cursor: pointer;
    }

    select:hover {
      border-color: rgba(79, 172, 254, 0.5);
      background: rgba(30,30,50,0.95);
    }

    select:focus {
      outline: none;
      border-color: #4facfe;
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
    }

    select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn {
      width: 100%; padding: 22px; border: none; border-radius: 24px;
      color: white; font-family: "Orbitron", monospace; font-weight: 800; 
      font-size: 18px; cursor: pointer; text-transform: uppercase; margin-top: 12px;
      transition: all 0.3s;
    }
    
    .btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-generate { background: linear-gradient(135deg, #667eea, #764ba2); }
    .btn-save { background: linear-gradient(135deg, #10b981, #34d399); }
    .btn-copy { background: linear-gradient(135deg, #8b5cf6, #c026d3); }
    
    /* BOTÃO LIMPAR SELEÇÃO - ROSA NEON */
    .btn-reset { background: linear-gradient(135deg, #ff007f, #ff5e62); }

    .result-box {
      background: rgba(25,25,45,0.95); border-radius: 24px; padding: 36px; 
      margin-top: 36px; border: 2px solid #4facfe; display: none;
      animation: fadeIn 0.5s ease;
    }
    .result-box.show { display: block; }

    .sensi-item { 
      display: flex; justify-content: space-between; padding: 18px 0; 
      border-bottom: 1px solid rgba(255,255,255,0.08);
      animation: slideIn 0.4s ease;
    }
    
    .s-name { color: #b0b0d0; font-weight: 600; }
    .s-val { 
      color: #00f2fe; font-family: "Orbitron", monospace; font-weight: 900; 
      font-size: 28px; 
    }

    .dpi-card { 
      background: rgba(79,172,254,0.15); padding: 24px; border-radius: 20px; 
      margin-top: 28px; text-align: center; border: 1px solid #4facfe; 
      font-weight: 700; font-size: 18px;
      animation: fadeIn 0.5s ease;
    }

    /* CAIXA DO TIMER - ROSA NEON */
    #timer {
      text-align: center;
      padding: 16px;
      background: rgba(255, 0, 127, 0.1);
      border-radius: 16px;
      margin-top: 16px;
      color: #ff85c0;
      border: 1px solid rgba(255, 0, 127, 0.3);
      font-weight: 600;
      display: none;
    }

    #timer.show {
      display: block;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: white; padding: 14px 24px; border-radius: 9999px;
      z-index: 1000; opacity: 0; transition: all 0.4s; display: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.94); z-index: 3000; justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }

    .modal-content {
      background: #1a1a2e; padding: 35px; border-radius: 28px; width: 90%; max-width: 440px;
      border: 1px solid rgba(79, 172, 254, 0.4); text-align: center;
      animation: fadeIn 0.3s ease;
    }

    .modal-content h2 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    .modal-content input {
      width: 100%; 
      padding: 16px; 
      border-radius: 16px; 
      background: rgba(255,255,255,0.08); 
      border: 1px solid #4facfe; 
      color: white; 
      font-size: 16px;
      transition: all 0.3s;
    }

    .modal-content input:focus {
      outline: none;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
    }

    .history-modal-content {
      background: #1a1a2e; width: 95%; max-width: 560px; border-radius: 28px;
      padding: 30px; max-height: 88vh; overflow-y: auto;
      border: 1px solid rgba(79, 172, 254, 0.4);
      animation: fadeIn 0.3s ease;
    }

    .history-modal-content h2 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    .history-item {
      background: rgba(255,255,255,0.06); padding: 20px; border-radius: 20px;
      margin-bottom: 16px; border-left: 4px solid #4facfe; transition: all 0.3s;
      animation: slideIn 0.4s ease;
      position: relative;
    }
    
    /* ESTILO DO FAVORITO */
    .history-item.is-fav {
      border-left: 4px solid #ff007f;
      background: rgba(255, 0, 127, 0.08);
    }

    .fav-star {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .fav-star:hover { transform: scale(1.2); }

    .history-item:hover { 
      background: rgba(255,255,255,0.12); 
      transform: translateX(8px); 
    }

    .history-item-date { font-size: 13px; color: #888; margin-bottom: 8px; }
    .history-item-name { font-weight: 700; font-size: 17px; margin-bottom: 10px; padding-right: 30px; }
    .history-item-details { font-size: 14.5px; color: #b0b0d0; line-height: 1.6; margin-bottom: 15px; }

    .history-item-buttons { display: flex; gap: 12px; }
    .history-item-buttons button {
      flex: 1; padding: 12px; border: none; border-radius: 12px;
      font-weight: 600; cursor: pointer; font-size: 15px;
      transition: all 0.3s;
    }
    
    .btn-load { background: #22c55e; }
    .btn-load:hover { background: #16a34a; transform: translateY(-2px); }
    
    .btn-delete { background: #ef4444; }
    .btn-delete:hover { background: #dc2626; transform: translateY(-2px); }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    .button-group button {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-confirm {
      background: #4facfe;
      color: white;
    }

    .btn-confirm:hover {
      background: #3b9cfd;
      transform: translateY(-2px);
    }

    .btn-cancel {
      background: #666;
      color: white;
    }

    .btn-cancel:hover {
      background: #555;
      transform: translateY(-2px);
    }

    /* ==================== RESPONSIVIDADE ====================*/
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px 20px;
        border-radius: 24px;
      }
      
      .entry-title {
        font-size: 32px;
      }
      
      .title {
        font-size: 28px;
      }
      
      .btn {
        padding: 18px;
        font-size: 16px;
      }
      
      .s-val {
        font-size: 24px;
      }

      .history-btn {
        width: 45px;
        height: 45px;
        font-size: 20px;
      }

      .modal-content {
        width: 95%;
        padding: 25px;
      }

      .history-modal-content {
        width: 98%;
        padding: 20px;
      }
    }

    @media (max-width: 320px) {
      .entry-title {
        font-size: 26px;
        letter-spacing: 1px;
      }

      .entry-subtitle {
        font-size: 18px;
      }

      #enter-btn {
        padding: 18px 50px;
        font-size: 18px;
      }

      .title {
        font-size: 22px;
      }

      .btn {
        font-size: 14px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>

    <div id="toast" class="toast"></div>

      tecno: { modelos: ["Tecno Spark 10","Tecno Spark 20","Tecno Camon 20"], base: { g: 170, r: 165, m2: 162, m4: 160, awm: 42, cam: 150, dpi: 700 }},
      asus: { modelos: ["ROG Phone 7","ROG Phone 8"], base: { g: 190, r: 185, m2: 182, m4: 180, awm: 52, cam: 170, dpi: 900 }},
      google: { modelos: ["Pixel 6","Pixel 7","Pixel 8"], base: { g: 183, r: 178, m2: 175, m4: 173, awm: 49, cam: 163, dpi: 870 }},
      oneplus: { modelos: ["OnePlus 11","OnePlus 12"], base: { g: 181, r: 176, m2: 173, m4: 171, awm: 48, cam: 161, dpi: 840 }},
      sony: { modelos: ["Xperia 1 V","Xperia 5 V"], base: { g: 184, r: 179, m2: 176, m4: 174, awm: 50, cam: 164, dpi: 880 }},
      nokia: { modelos: ["Nokia G50","Nokia G60"], base: { g: 168, r: 163, m2: 160, m4: 158, awm: 40, cam: 148, dpi: 650 }},
      lenovo: { modelos: ["Legion Y700"], base: { g: 186, r: 181, m2: 178, m4: 176, awm: 51, cam: 166, dpi: 890 }},
      positivo: { modelos: ["Positivo Smart"], base: { g: 165, r: 160, m2: 157, m4: 155, awm: 38, cam: 145, dpi: 600 }},
      multilaser: { modelos: ["Multilaser M13"], base: { g: 167, r: 162, m2: 159, m4: 157, awm: 39, cam: 147, dpi: 620 }}
    };

    const brandSelect = document.getElementById('brand');
    const modelSelect = document.getElementById('model');
    const generateBtn = document.getElementById('generateBtn');
    const resultBox = document.getElementById('resultBox');
    const timerEl = document.getElementById('timer');
    const toastEl = document.getElementById('toast');

    let timerInterval = null;
    let cooldownEndTime = null;
    const MAX_HISTORY = 30;

    // ==================== FUNÇÕES DE VALIDAÇÃO ====================
    function validateInput(str, maxLength = 100) {
      if (!str || typeof str !== 'string') return '';
      return str.trim().substring(0, maxLength).replace(/[<>]/g, '');
    }

    function sanitize(str) {
      if (typeof str !== 'string') return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ==================== FUNÇÕES DE LOCALSTORAGE ====================
    function getSafeHistory() {
      try {
        if (!isLocalStorageAvailable()) return [];
        const data = JSON.parse(localStorage.getItem('sensiHistory') || '[]');
        return Array.isArray(data) ? data : [];
      } catch (e) { 
        console.error('Erro ao carregar histórico:', e);
        return []; 
      }
    }

    // ==================== TOAST NOTIFICATIONS ====================
    function showToast(message, type = "normal") {
      toastEl.textContent = message;
      toastEl.style.display = "block";
      toastEl.style.opacity = "1";
      
      const colors = {
        "success": "#10b981",
        "error": "#ef4444",
        "warning": "#f59e0b",
        "normal": "#1f2937"
      };
      
      toastEl.style.background = colors[type] || colors.normal;
      
      setTimeout(() => {
        toastEl.style.opacity = "0";
        setTimeout(() => toastEl.style.display = "none", 400);
      }, 2800);
    }

    // ==================== COOLDOWN SYSTEM ====================
    function checkCooldown(model) {
      if (!model || !isLocalStorageAvailable()) return false;
      try {
        const stored = JSON.parse(localStorage.getItem(`cooldown_${model}`) || '{}');
        if (!stored.end || Date.now() >= stored.end) {
          localStorage.removeItem(`cooldown_${model}`);
          return false;
        }
        cooldownEndTime = stored.end;
        startRealTimeTimer();
        return true;
      } catch (e) { 
        return false; 
      }
    }

    function startRealTimeTimer() {
      if (timerInterval) clearInterval(timerInterval);
      
      // BOTÃO FICA ROSA NEON DURANTE O COOLDOWN
      generateBtn.style.background = 'linear-gradient(135deg, #ff007f, #ff5e62)';
      timerEl.classList.add('show');
      
      const update = () => {
        const restante = cooldownEndTime - Date.now();
        if (restante <= 0) {
          clearInterval(timerInterval);
          timerEl.innerHTML = "✅ Pode gerar novamente!";
          timerEl.classList.remove('show');
          generateBtn.textContent = "⚡ Gerar Sensibilidade PRO";
          generateBtn.disabled = false;
          generateBtn.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
          return;
        }
        const m = Math.floor((restante % 3600000) / 60000);
        const s = Math.floor((restante % 60000) / 1000);
        timerEl.innerHTML = `⏰ Aguarde: <strong>${m}m ${s}s</strong>`;
        generateBtn.textContent = `Aguarde ${m}m ${s}s`;
        generateBtn.disabled = true;
      };
      timerInterval = setInterval(update, 1000);
      update();
    }

    // ==================== MODAL FUNCTIONS ====================
    function openSaveModal() {
      if (!modelSelect.value) return showToast("❌ Selecione marca e modelo primeiro", "error");
      document.getElementById('sensiName').value = `Sensi ${modelSelect.value}`;
      document.getElementById('nameModal').classList.add('show');
      document.getElementById('sensiName').focus();
    }

    function closeNameModal() {
      document.getElementById('nameModal').classList.remove('show');
    }

    function saveWithName() {
      const nameInput = document.getElementById('sensiName').value.trim();
      if (!nameInput) return showToast("❌ Digite um nome", "error");
      
      if (!isLocalStorageAvailable()) {
        return showToast("⚠️ LocalStorage não disponível", "warning");
      }

      const safeName = sanitize(validateInput(nameInput));
      closeNameModal();

      const sensi = {
        id: Date.now(),
        name: safeName,
        date: new Date().toLocaleString('pt-BR'),
        model: modelSelect.value,
        g: parseInt(document.getElementById("res-g").innerText) || 0,
        r: parseInt(document.getElementById("res-r").innerText) || 0,
        m2: parseInt(document.getElementById("res-2").innerText) || 0,
        m4: parseInt(document.getElementById("res-4").innerText) || 0,
        awm: parseInt(document.getElementById("res-a").innerText) || 0,
        cam: parseInt(document.getElementById("res-c").innerText) || 0,
        dpi: parseInt(document.getElementById("res-dpi").innerText.match(/\d+/)[0]) || 0,
        fav: false
      };

      let history = getSafeHistory();
      history.unshift(sensi);
      history = history.slice(0, MAX_HISTORY);
      localStorage.setItem('sensiHistory', JSON.stringify(history));
      showToast(`✅ "${safeName}" salva com sucesso!`, "success");
    }

    // ==================== HISTORY FUNCTIONS ====================
    function showHistory() {
      const history = getSafeHistory();
      const list = document.getElementById('historyList');
      list.innerHTML = '';

      if (history.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:40px; color:#777;">Nenhuma sensibilidade salva ainda.</div>';
      } else {
        // Ordena para mostrar favoritos primeiro
        const sortedHistory = [...history].sort((a, b) => b.fav - a.fav);

        sortedHistory.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = `history-item ${item.fav ? 'is-fav' : ''}`;
          div.style.animationDelay = `${index * 0.05}s`;
          div.innerHTML = `
            <span class="fav-star" onclick="toggleFav(${item.id})">${item.fav ? '⭐' : '☆'}</span>
            <div class="history-item-date">${item.date}</div>
            <div class="history-item-name">${sanitize(item.name)} — ${item.model}</div>
            <div class="history-item-details">
              Geral: ${item.g} | Red: ${item.r} | 2X: ${item.m2} | 4X: ${item.m4} | AWM: ${item.awm} | DPI: ${item.dpi}
            </div>
            <div class="history-item-buttons">
              <button class="btn-load" onclick="loadFromHistory(${item.id}); closeHistory()">📂 Carregar</button>
              <button class="btn-delete" onclick="deleteFromHistory(${item.id}); event.stopImmediatePropagation()">🗑️ Deletar</button>
            </div>
          `;
          list.appendChild(div);
        });
      }
      document.getElementById('historyModal').classList.add('show');
    }

    function toggleFav(id) {
      let history = getSafeHistory();
      history = history.map(item => item.id === id ? {...item, fav: !item.fav} : item);
      localStorage.setItem('sensiHistory', JSON.stringify(history));
      showHistory();
      showToast("⭐ Favoritos atualizados!", "success");
    }

    function loadFromHistory(id) {
      const history = getSafeHistory();
      const item = history.find(h => h.id === id);
      if (item) {
        document.getElementById("res-model").innerText = "📱 " + item.model;
        document.getElementById("res-g").innerText = item.g;
        document.getElementById("res-r").innerText = item.r;
        document.getElementById("res-2").innerText = item.m2;
        document.getElementById("res-4").innerText = item.m4;
        document.getElementById("res-a").innerText = item.awm;
        document.getElementById("res-c").innerText = item.cam;
        document.getElementById("res-dpi").innerText = `DPI RECOMENDADA: ${item.dpi}`;
        resultBox.classList.add("show");
        showToast(`✅ Configuração carregada!`, "success");
      }
    }

    function deleteFromHistory(id) {
      if (confirm("Deseja realmente excluir esta sensibilidade?")) {
        let history = getSafeHistory().filter(h => h.id !== id);
        if (isLocalStorageAvailable()) {
          localStorage.setItem('sensiHistory', JSON.stringify(history));
        }
        showHistory();
        showToast("✅ Sensibilidade excluída com sucesso!", "success");
      }
    }

    function clearAllHistory() {
      if (confirm("⚠️ Tem certeza que deseja apagar TODO o histórico?\n\nEsta ação não pode ser desfeita.")) {
        if (isLocalStorageAvailable()) {
          localStorage.removeItem('sensiHistory');
        }
        showHistory();
        showToast("✅ Todo o histórico foi apagado com sucesso!", "success");
      }
    }

    function closeHistory() {
      document.getElementById('historyModal').classList.remove('show');
    }

    // ==================== RESET FUNCTION ====================
    function resetGenerator() {
      brandSelect.value = '';
      modelSelect.value = '';
      modelSelect.disabled = true;
      resultBox.classList.remove('show');
      if (timerInterval) clearInterval(timerInterval);
      timerEl.classList.remove('show');
      generateBtn.textContent = "⚡ Gerar Sensibilidade PRO";
      generateBtn.disabled = false;
      generateBtn.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
      showToast("🔄 Seleção limpa!", "success");
    }

    // ==================== GENERATE SENSI ====================
    function generateSensi() {
      const brand = brandSelect.value;
      const model = modelSelect.value;
      if (!brand || !model) return showToast("❌ Selecione marca e modelo!", "error");

      if (checkCooldown(model)) return showToast("⏳ Ainda em cooldown!", "warning");

      generateBtn.textContent = "⚡ Gerando...";
      generateBtn.disabled = true;

      cooldownEndTime = Date.now() + (5 * 60 * 1000);
      startRealTimeTimer();

      setTimeout(() => {
        const base = database[brand].base;
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const v = {
          g: Math.max(158, Math.min(208, base.g + rand(-13, 13))),
          r: Math.max(152, Math.min(200, base.r + rand(-13, 13))),
          m2: Math.max(145, Math.min(200, base.m2 + rand(-15, 14))),
          m4: Math.max(142, Math.min(198, base.m4 + rand(-15, 14))),
          awm: Math.max(30, Math.min(75, base.awm + rand(-8, 9))),
          cam: Math.max(132, Math.min(188, base.cam + rand(-12, 13))),
          dpi: Math.round((base.dpi + rand(-40, 45)) / 10) * 10
        };

        document.getElementById("res-model").innerText = "📱 " + model;
        document.getElementById("res-g").innerText = v.g;
        document.getElementById("res-r").innerText = v.r;
        document.getElementById("res-2").innerText = v.m2;
        document.getElementById("res-4").innerText = v.m4;
        document.getElementById("res-a").innerText = v.awm;
        document.getElementById("res-c").innerText = v.cam;
        document.getElementById("res-dpi").innerText = `DPI RECOMENDADA: ${v.dpi}`;

        resultBox.classList.add("show");
        
        if (isLocalStorageAvailable()) {
          localStorage.setItem(`cooldown_${model}`, JSON.stringify({ end: cooldownEndTime }));
        }
        
        showToast("✅ Sensibilidade gerada com sucesso!", "success");

        generateBtn.textContent = "⚡ Gerar Sensibilidade PRO";
        generateBtn.disabled = false;
      }, 1300);
    }

    // ==================== COPY CONFIG ====================
    function copyConfig() {
      const model = modelSelect.value;
      const texto = `⚡ NIEL REALSENSI PRO\n📱 ${model}\n\nGERAL: ${document.getElementById("res-g").innerText}\nRED DOT: ${document.getElementById("res-r").innerText}\n2X: ${document.getElementById("res-2").innerText}\n4X: ${document.getElementById("res-4").innerText}\nAWM: ${document.getElementById("res-a").innerText}\nCÂMERA: ${document.getElementById("res-c").innerText}\n${document.getElementById("res-dpi").innerText}`;
      
      navigator.clipboard.writeText(texto).then(() => {
        showToast("✅ Copiado para área de transferência!", "success");
      }).catch(() => {
        showToast("❌ Erro ao copiar", "error");
      });
    }

    // ==================== LOAD MODELS ====================
    function loadModels() {
      const brand = brandSelect.value;
      modelSelect.innerHTML = '<option value="">Selecione o modelo...</option>';
      modelSelect.disabled = !brand;
      if (brand && database[brand]) {
        database[brand].modelos.sort().forEach(m => {
          const opt = document.createElement('option');
          opt.value = m; 
          opt.textContent = m;
          modelSelect.appendChild(opt);
        });
      }
      resultBox.classList.remove('show');
    }

    // ==================== ENTRY SCREEN ====================
    function entrarNoApp() {
      const btn = document.getElementById('enter-btn');
      btn.style.animation = 'pulse 0.6s';
      setTimeout(() => {
        document.getElementById('entry-screen').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('entry-screen').style.display = 'none';
          document.getElementById('main-app').style.display = 'block';
        }, 700);
      }, 300);
    }

    // ==================== EVENT LISTENERS ====================
    brandSelect.addEventListener("change", loadModels);
    generateBtn.addEventListener("click", generateSensi);

    document.getElementById('nameModal').addEventListener('click', e => { 
      if (e.target.id === 'nameModal') closeNameModal(); 
    });
    
    document.getElementById('historyModal').addEventListener('click', e => { 
      if (e.target.id === 'historyModal') closeHistory(); 
    });

    // Enter key para salvar
    document.getElementById('sensiName').addEventListener('keypress', e => {
      if (e.key === 'Enter') saveWithName();
    });

    // ==================== INICIALIZAÇÃO ====================
    window.addEventListener('load', () => {
      if (!isLocalStorageAvailable()) {
        showToast("⚠️ LocalStorage não disponível - histórico desativado", "warning");
      } else {
        setTimeout(() => showToast("👋 Bem-vindo ao NIEL REALSENSI PRO"), 800);
      }
    });
  </script>
</body>
</html>
