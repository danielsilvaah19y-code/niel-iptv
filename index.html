<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIEL REALSENSI PRO - OFICIAL</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

  <style>

    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap");

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      background-image: url('https://i.ibb.co/WNg5B4qF/image-31e568da.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    /* ==================== TELA DE ENTRADA ==================== */
    #entry-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 10, 20, 0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; transition: opacity 0.8s ease;
    }

    .eagle-entry {
      width: 100%; max-width: 320px; margin-bottom: 35px;
      filter: drop-shadow(0 25px 50px rgba(139, 92, 246, 0.9));
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .entry-title {
      font-family: "Orbitron", monospace; font-size: 38px; font-weight: 900;
      background: linear-gradient(135deg, #4facfe, #00f2fe, #c026d3);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px; letter-spacing: 2px;
    }

    .entry-subtitle {
      font-size: 23px; font-weight: 700; color: #a0a0cc;
      letter-spacing: 3px; margin-bottom: 60px;
    }

    #enter-btn {
      background: linear-gradient(135deg, #667eea, #764ba2); color: white;
      border: none; padding: 22px 70px; font-family: "Orbitron", monospace;
      font-size: 21px; font-weight: 800; text-transform: uppercase;
      border-radius: 30px; cursor: pointer; box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
      transition: all 0.4s;
    }
    #enter-btn:hover { transform: scale(1.08); box-shadow: 0 20px 50px rgba(102, 126, 234, 0.7); }

    #main-app { display: none; padding: 20px 15px; }

    .container {
      background: rgba(15, 15, 25, 0.95); backdrop-filter: blur(30px);
      border-radius: 32px; box-shadow: 0 32px 80px -20px rgba(0,0,0,0.7);
      max-width: 520px; width: 100%; padding: 48px 40px 40px;
      border: 1px solid rgba(255,255,255,0.1); position: relative; margin: 0 auto;
    }

    .header { text-align: center; margin-bottom: 40px; }
    .logo { width: 100%; max-width: 200px; margin: 0 auto 24px; border-radius: 20px; filter: drop-shadow(0 20px 40px rgba(102, 126, 234, 0.4)); }

    .eagle-logo {
      display: block; width: 100%; max-width: 380px; margin: 45px auto 20px;
      border-radius: 20px; filter: drop-shadow(0 25px 50px rgba(139, 92, 246, 0.7));
    }

    .title { font-family: "Orbitron", monospace; font-size: 36px; font-weight: 900;
      background: linear-gradient(135deg, #4facfe, #00f2fe); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; }
    .subtitle { font-size: 16px; color: #a0a0cc; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }

    .history-btn {
      position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.15);
      border: none; color: white; font-size: 24px; width: 50px; height: 50px;
      border-radius: 50%; cursor: pointer;
    }

    .label { font-size: 14px; color: #b0b0d0; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; display: block; }

    select {
      width: 100%; padding: 20px 24px; background: rgba(30,30,50,0.8); 
      border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; 
      color: white; font-size: 16px; font-weight: 600; margin-bottom: 24px;
    }

    .btn {
      width: 100%; padding: 22px; border: none; border-radius: 24px;
      color: white; font-family: "Orbitron", monospace; font-weight: 800; 
      font-size: 18px; cursor: pointer; text-transform: uppercase; margin-top: 12px;
      transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

    .btn-generate { background: linear-gradient(135deg, #667eea, #764ba2); }
    .btn-save { background: linear-gradient(135deg, #10b981, #34d399); }
    .btn-copy { background: linear-gradient(135deg, #8b5cf6, #c026d3); }

    .result-box {
      background: rgba(25,25,45,0.95); border-radius: 24px; padding: 36px; 
      margin-top: 36px; border: 2px solid #4facfe; display: none;
    }
    .result-box.show { display: block; }

    .sensi-item { display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .s-name { color: #b0b0d0; font-weight: 600; }
    .s-val { color: #00f2fe; font-family: "Orbitron", monospace; font-weight: 900; font-size: 28px; }

    .dpi-card { background: rgba(79,172,254,0.15); padding: 24px; border-radius: 20px; margin-top: 28px; text-align: center; border: 1px solid #4facfe; font-weight: 700; font-size: 18px; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: white; padding: 14px 24px; border-radius: 9999px;
      z-index: 1000; opacity: 0; transition: all 0.4s; display: none;
    }

    /* ==================== MODAIS PROFISSIONAIS ==================== */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.94); z-index: 3000; justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }

    .modal-content {
      background: #1a1a2e; padding: 35px; border-radius: 28px; width: 90%; max-width: 440px;
      border: 1px solid rgba(79, 172, 254, 0.4); text-align: center;
    }

    .history-modal-content {
      background: #1a1a2e; width: 95%; max-width: 560px; border-radius: 28px;
      padding: 30px; max-height: 88vh; overflow-y: auto;
      border: 1px solid rgba(79, 172, 254, 0.4);
    }

    .history-modal-content h2 { text-align: center; margin-bottom: 25px; font-size: 24px; color: #4facfe; }

    .btn-clear-all {
      background: #ef4444; width: 100%; padding: 14px; border: none;
      border-radius: 16px; color: white; font-weight: 600; margin-bottom: 20px; cursor: pointer;
    }

    .history-item {
      background: rgba(255,255,255,0.06); padding: 20px; border-radius: 20px;
      margin-bottom: 16px; border-left: 4px solid #4facfe; transition: all 0.3s;
    }
    .history-item:hover { background: rgba(255,255,255,0.12); transform: translateX(8px); }

    .history-item-date { font-size: 13px; color: #888; margin-bottom: 8px; }
    .history-item-name { font-weight: 700; font-size: 17px; margin-bottom: 10px; }
    .history-item-details { font-size: 14.5px; color: #b0b0d0; line-height: 1.6; margin-bottom: 15px; }

    .history-item-buttons { display: flex; gap: 12px; }
    .history-item-buttons button {
      flex: 1; padding: 12px; border: none; border-radius: 12px;
      font-weight: 600; cursor: pointer; font-size: 15px;
    }
    .btn-load { background: #22c55e; }
    .btn-load:hover { background: #16a34a; }
    .btn-delete { background: #ef4444; }
    .btn-delete:hover { background: #dc2626; }
  </style>
</head>
<body>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    // ==================== DATABASE ====================
    const database = {
      samsung: { modelos: ["Galaxy A01","Galaxy A02","Galaxy A03","Galaxy A04","Galaxy A05","Galaxy A06","Galaxy A10","Galaxy A10s","Galaxy A11","Galaxy A12","Galaxy A13","Galaxy A14","Galaxy A15","Galaxy A16","Galaxy A20","Galaxy A20s","Galaxy A21","Galaxy A21s","Galaxy A22","Galaxy A23","Galaxy A24","Galaxy A25","Galaxy A30","Galaxy A30s","Galaxy A31","Galaxy A32","Galaxy A33","Galaxy A34","Galaxy A35","Galaxy A50","Galaxy A51","Galaxy A52","Galaxy A53","Galaxy A54","Galaxy A55","Galaxy S20 FE","Galaxy S21","Galaxy S23","Galaxy S23 Ultra","Galaxy S24","Galaxy S24 Ultra","Galaxy S25","Galaxy A36","Galaxy A56"], base: { g: 175, r: 170, m2: 168, m4: 165, awm: 45, cam: 155, dpi: 720 }},
      motorola: { modelos: ["Moto E7","Moto E13","Moto E22","Moto G05","Moto G06","Moto G8 Play","Moto G9 Play","Moto G10","Moto G15","Moto G20","Moto G22","Moto G23","Moto G24","Moto G30","Moto G32","Moto G35","Moto G42","Moto G52","Moto G54","Moto G55","Moto G56","Moto G60","Moto G73","Moto G75","Moto G84","Moto G85","Moto G86","Moto Edge 30","Moto Edge 40","Moto Edge 50","Moto Edge 50 Pro"], base: { g: 170, r: 165, m2: 162, m4: 160, awm: 42, cam: 150, dpi: 700 }},
      xiaomi: { modelos: ["Redmi 9","Redmi 9A","Redmi 10","Redmi 12","Redmi 12C","Redmi 13C","Redmi 14C","Redmi 15C","Redmi Note 8","Redmi Note 9","Redmi Note 10","Redmi Note 11","Redmi Note 12","Redmi Note 13","Redmi Note 13 Pro","Redmi Note 14","Redmi Note 14 Pro","Poco X3 Pro","Poco X5 Pro","Poco X6 Pro","Poco X7 Pro","Poco F5","Poco F6","Poco F7"], base: { g: 180, r: 175, m2: 172, m4: 170, awm: 48, cam: 160, dpi: 800 }},
      realme: { modelos: ["Realme 7","Realme 7 Pro","Realme 8","Realme 8 Pro","Realme 9","Realme 9i","Realme 10","Realme 11","Realme 14 Pro+","Realme 15T","Realme C11","Realme C21","Realme C33","Realme C35","Realme C53","Realme C55","Realme C61","Realme C63","Realme C71","Realme C75","Realme Narzo 50","Realme Narzo 60","Realme GT 7 Pro"], base: { g: 178, r: 172, m2: 170, m4: 168, awm: 46, cam: 158, dpi: 780 }},
      infinix: { modelos: ["Hot 10","Hot 11","Hot 12","Hot 20i","Hot 30i","Hot 40i","Note 12","Note 30","Note 30 Pro","Zero 5G","Zero 30","Hot 50","Note 40 Pro"], base: { g: 172, r: 168, m2: 165, m4: 162, awm: 44, cam: 152, dpi: 760 }},
      lg: { modelos: ["LG K8","LG K9","LG K10","LG K11","LG K12","LG K20","LG K22","LG K30","LG K31","LG K32","LG K40","LG K41","LG K42","LG K50","LG K51","LG K52","LG K61","LG Stylo 6","LG Velvet","LG Wing"], base: { g: 168, r: 163, m2: 160, m4: 158, awm: 40, cam: 148, dpi: 650 }},
      apple: { modelos: ["iPhone 8","iPhone 8 Plus","iPhone X","iPhone 11","iPhone 12","iPhone 13","iPhone 14","iPhone 15","iPhone 15 Pro Max","iPhone 16","iPhone 16 Pro Max"], base: { g: 185, r: 180, m2: 178, m4: 175, awm: 50, cam: 165, dpi: 880 }},
      zte: { modelos: ["Nubia Z60","Nubia Z60 Ultra","Nubia V60","Nubia V60 Design","Nubia Red Magic 9 Pro","Nubia Red Magic 10","ZTE Axon 60","ZTE Blade V40","ZTE Blade A73","Nubia Flip","Nubia Z50","Nubia Neo 2","Nubia Red Magic 9S Pro"], base: { g: 182, r: 177, m2: 174, m4: 171, awm: 47, cam: 162, dpi: 810 }},
      oppo: { modelos: ["Oppo A15","Oppo A16","Oppo A17","Oppo A31","Oppo A53","Oppo A54","Oppo A74","Oppo A76","Oppo A77","Oppo A78","Oppo Reno 12","Oppo Reno 13"], base: { g: 176, r: 171, m2: 169, m4: 166, awm: 44, cam: 156, dpi: 800 }},
      vivo: { modelos: ["Vivo Y11","Vivo Y12","Vivo Y15","Vivo Y20","Vivo Y21","Vivo Y22","Vivo Y33","Vivo Y35","Vivo Y55","Vivo V30","Vivo Y200","Vivo S19"], base: { g: 173, r: 168, m2: 165, m4: 163, awm: 42, cam: 153, dpi: 780 }},
      huawei: { modelos: ["Huawei P30","Huawei P40","Huawei P50","Huawei P60","Huawei Mate 20","Huawei Mate 40","Huawei Nova 12","Honor Magic 6","Honor 200"], base: { g: 177, r: 172, m2: 170, m4: 167, awm: 45, cam: 157, dpi: 850 }},
      asus: { modelos: ["ROG Phone 7","ROG Phone 8","ROG Phone 8 Pro"], base: { g: 190, r: 185, m2: 182, m4: 180, awm: 52, cam: 170, dpi: 900 }},
      google: { modelos: ["Pixel 6","Pixel 7","Pixel 8","Pixel 8 Pro"], base: { g: 183, r: 178, m2: 175, m4: 173, awm: 49, cam: 163, dpi: 870 }},
      oneplus: { modelos: ["OnePlus 11","OnePlus 12","OnePlus 13"], base: { g: 181, r: 176, m2: 173, m4: 171, awm: 48, cam: 161, dpi: 840 }},
      sony: { modelos: ["Xperia 1 V","Xperia 5 V"], base: { g: 184, r: 179, m2: 176, m4: 174, awm: 50, cam: 164, dpi: 880 }},
      tecno: { modelos: ["Tecno Spark 10","Tecno Camon 20"], base: { g: 170, r: 165, m2: 162, m4: 160, awm: 42, cam: 150, dpi: 700 }},
      lenovo: { modelos: ["Legion Y700"], base: { g: 186, r: 181, m2: 178, m4: 176, awm: 51, cam: 166, dpi: 890 }},
      nokia: { modelos: ["Nokia G50","Nokia X100"], base: { g: 168, r: 163, m2: 160, m4: 158, awm: 40, cam: 148, dpi: 650 }},
      positivo: { modelos: ["Positivo Smart"], base: { g: 165, r: 160, m2: 157, m4: 155, awm: 38, cam: 145, dpi: 600 }},
      multilaser: { modelos: ["Multilaser M13"], base: { g: 167, r: 162, m2: 159, m4: 157, awm: 39, cam: 147, dpi: 620 }}
    };

    // Elementos
    const brandSelect = document.getElementById('brand');
    const modelSelect = document.getElementById('model');
    const generateBtn = document.getElementById('generateBtn');
    const resultBox = document.getElementById('resultBox');
    const timerEl = document.getElementById('timer');
    const toastEl = document.getElementById('toast');

    let timerInterval = null;
    let cooldownEndTime = null;
    const MAX_HISTORY = 30;

    function sanitize(str) {
      if (typeof str !== 'string') return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getSafeHistory() {
      try {
        const data = JSON.parse(localStorage.getItem('sensiHistory') || '[]');
        return Array.isArray(data) ? data : [];
      } catch (e) { return []; }
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.style.display = "block";
      toastEl.style.opacity = "1";
      setTimeout(() => {
        toastEl.style.opacity = "0";
        setTimeout(() => toastEl.style.display = "none", 400);
      }, 2800);
    }

    function checkCooldown(model) {
      if (!model) return false;
      try {
        const stored = JSON.parse(localStorage.getItem(`cooldown_${model}`) || '{}');
        if (!stored.end || Date.now() >= stored.end) {
          localStorage.removeItem(`cooldown_${model}`);
          return false;
        }
        cooldownEndTime = stored.end;
        startRealTimeTimer();
        return true;
      } catch (e) { return false; }
    }

    function startRealTimeTimer() {
      if (timerInterval) clearInterval(timerInterval);
      const update = () => {
        const restante = cooldownEndTime - Date.now();
        if (restante <= 0) {
          clearInterval(timerInterval);
          timerEl.innerHTML = "✅ Pode gerar novamente!";
          generateBtn.textContent = "⚡ Gerar Sensibilidade PRO";
          generateBtn.disabled = false;
          return;
        }
        const m = Math.floor((restante % 3600000) / 60000);
        const s = Math.floor((restante % 60000) / 1000);
        timerEl.innerHTML = `⏰ Aguarde: <strong>${m}m ${s}s</strong>`;
        generateBtn.textContent = `Aguarde ${m}m ${s}s`;
        generateBtn.disabled = true;
      };
      timerInterval = setInterval(update, 1000);
      update();
    }

    function openSaveModal() {
      if (!modelSelect.value) return showToast("❌ Selecione marca e modelo primeiro");
      document.getElementById('sensiName').value = `Sensi ${modelSelect.value}`;
      document.getElementById('nameModal').classList.add('show');
    }

    function closeNameModal() {
      document.getElementById('nameModal').classList.remove('show');
    }

    function saveWithName() {
      const nameInput = document.getElementById('sensiName').value.trim();
      if (!nameInput) return showToast("❌ Digite um nome");
      const safeName = sanitize(nameInput);
      closeNameModal();

      const sensi = {
        id: Date.now(),
        name: safeName,
        date: new Date().toLocaleString('pt-BR'),
        model: modelSelect.value,
        g: parseInt(document.getElementById("res-g").innerText) || 0,
        r: parseInt(document.getElementById("res-r").innerText) || 0,
        m2: parseInt(document.getElementById("res-2").innerText) || 0,
        m4: parseInt(document.getElementById("res-4").innerText) || 0,
        awm: parseInt(document.getElementById("res-a").innerText) || 0,
        cam: parseInt(document.getElementById("res-c").innerText) || 0,
        dpi: parseInt(document.getElementById("res-dpi").innerText.match(/\d+/)[0]) || 0
      };

      let history = getSafeHistory();
      history.unshift(sensi);
      history = history.slice(0, MAX_HISTORY);
      localStorage.setItem('sensiHistory', JSON.stringify(history));
      showToast(`✅ "${safeName}" salva com sucesso!`);
    }

    function showHistory() {
      const history = getSafeHistory();
      const list = document.getElementById('historyList');
      list.innerHTML = '';

      if (history.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:40px; color:#777;">Nenhuma sensibilidade salva ainda.</div>';
      } else {
        history.forEach(item => {
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `
            <div class="history-item-date">${item.date}</div>
            <div class="history-item-name">${item.name} — ${item.model}</div>
            <div class="history-item-details">
              Geral: ${item.g} | Red: ${item.r} | 2X: ${item.m2} | 4X: ${item.m4} | AWM: ${item.awm} | DPI: ${item.dpi}
            </div>
            <div class="history-item-buttons">
              <button class="btn-load" onclick="loadFromHistory(${item.id}); closeHistory()">📂 Carregar</button>
              <button class="btn-delete" onclick="deleteFromHistory(${item.id}); event.stopImmediatePropagation()">🗑️ Deletar</button>
            </div>
          `;
          list.appendChild(div);
        });
      }
      document.getElementById('historyModal').classList.add('show');
    }

    function loadFromHistory(id) {
      const history = getSafeHistory();
      const item = history.find(h => h.id === id);
      if (item) {
        document.getElementById("res-model").innerText = "📱 " + item.model;
        document.getElementById("res-g").innerText = item.g;
        document.getElementById("res-r").innerText = item.r;
        document.getElementById("res-2").innerText = item.m2;
        document.getElementById("res-4").innerText = item.m4;
        document.getElementById("res-a").innerText = item.awm;
        document.getElementById("res-c").innerText = item.cam;
        document.getElementById("res-dpi").innerText = `DPI RECOMENDADA: ${item.dpi}`;
        resultBox.classList.add("show");
        showToast(`✅ Configuração carregada!`);
      }
    }

    function deleteFromHistory(id) {
      if (confirm("Deletar esta sensibilidade?")) {
        let history = getSafeHistory().filter(h => h.id !== id);
        localStorage.setItem('sensiHistory', JSON.stringify(history));
        showHistory();
        showToast("✅ Deletada!");
      }
    }

    function clearAllHistory() {
      if (confirm("⚠️ Apagar TODO o histórico?")) {
        localStorage.removeItem('sensiHistory');
        showHistory();
        showToast("✅ Histórico limpo!");
      }
    }

    function closeHistory() {
      document.getElementById('historyModal').classList.remove('show');
    }

    function generateSensi() {
      const brand = brandSelect.value;
      const model = modelSelect.value;
      if (!brand || !model) return showToast("❌ Selecione marca e modelo!");

      if (checkCooldown(model)) return showToast("⏳ Ainda em cooldown!");

      generateBtn.textContent = "⚡ Gerando...";
      generateBtn.disabled = true;

      cooldownEndTime = Date.now() + (5 * 60 * 1000);
      startRealTimeTimer();

      setTimeout(() => {
        const base = database[brand].base;
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const v = {
          g: Math.max(158, Math.min(208, base.g + rand(-13, 13))),
          r: Math.max(152, Math.min(200, base.r + rand(-13, 13))),
          m2: Math.max(145, Math.min(200, base.m2 + rand(-15, 14))),
          m4: Math.max(142, Math.min(198, base.m4 + rand(-15, 14))),
          awm: Math.max(30, Math.min(75, base.awm + rand(-8, 9))),
          cam: Math.max(132, Math.min(188, base.cam + rand(-12, 13))),
          dpi: Math.round((base.dpi + rand(-40, 45)) / 10) * 10
        };

        document.getElementById("res-model").innerText = "📱 " + model;
        document.getElementById("res-g").innerText = v.g;
        document.getElementById("res-r").innerText = v.r;
        document.getElementById("res-2").innerText = v.m2;
        document.getElementById("res-4").innerText = v.m4;
        document.getElementById("res-a").innerText = v.awm;
        document.getElementById("res-c").innerText = v.cam;
        document.getElementById("res-dpi").innerText = `DPI RECOMENDADA: ${v.dpi}`;

        resultBox.classList.add("show");
        localStorage.setItem(`cooldown_${model}`, JSON.stringify({ end: cooldownEndTime }));
        showToast("✅ Sensibilidade gerada com sucesso!");

        generateBtn.textContent = "⚡ Gerar Sensibilidade PRO";
        generateBtn.disabled = false;
      }, 1300);
    }

    function copyConfig() {
      const model = modelSelect.value;
      const texto = `⚡ NIEL REALSENSI PRO\n📱 ${model}\n\nGERAL: ${document.getElementById("res-g").innerText}\nRED DOT: ${document.getElementById("res-r").innerText}\n2X: ${document.getElementById("res-2").innerText}\n4X: ${document.getElementById("res-4").innerText}\nAWM: ${document.getElementById("res-a").innerText}\nCÂMERA: ${document.getElementById("res-c").innerText}\n${document.getElementById("res-dpi").innerText}`;
      navigator.clipboard.writeText(texto).then(() => showToast("✅ Copiado para área de transferência!"));
    }

    function loadModels() {
      const brand = brandSelect.value;
      modelSelect.innerHTML = '<option value="">Selecione o modelo...</option>';
      modelSelect.disabled = !brand;
      if (brand && database[brand]) {
        database[brand].modelos.sort().forEach(m => {
          const opt = document.createElement('option');
          opt.value = m; opt.textContent = m;
          modelSelect.appendChild(opt);
        });
      }
      resultBox.classList.remove('show');
    }

    function entrarNoApp() {
      const btn = document.getElementById('enter-btn');
      btn.style.animation = 'pulse 0.6s';
      setTimeout(() => {
        document.getElementById('entry-screen').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('entry-screen').style.display = 'none';
          document.getElementById('main-app').style.display = 'block';
        }, 700);
      }, 300);
    }

    // Inicialização
    brandSelect.addEventListener("change", loadModels);
    generateBtn.addEventListener("click", generateSensi);

    document.getElementById('nameModal').addEventListener('click', e => { if (e.target.id === 'nameModal') closeNameModal(); });
    document.getElementById('historyModal').addEventListener('click', e => { if (e.target.id === 'historyModal') closeHistory(); });

    setTimeout(() => showToast("👋 Bem-vindo ao NIEL REALSENSI PRO"), 800);
  </script>
</body>
  </html>
