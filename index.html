<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIEL REALSENSI PRO - OFICIAL</title>
  <meta name="description" content="Gerador oficial de sensibilidade PRO para Free Fire Max" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap");

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --accent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --purple: linear-gradient(135deg, #8b5cf6, #c026d3);
    }

    body {
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px 15px;
      overflow-x: hidden;
    }

    .container {
      background: rgba(15, 15, 25, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      box-shadow: 0 32px 80px -20px rgba(0, 0, 0, 0.7);
      max-width: 520px;
      width: 100%;
      padding: 48px 40px 80px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header { text-align: center; margin-bottom: 40px; }
    .logo { 
      width: 100%; 
      max-width: 200px; 
      margin: 0 auto 24px; 
      border-radius: 20px; 
      filter: drop-shadow(0 20px 40px rgba(102, 126, 234, 0.4)); 
    }

    .title {
      font-family: "Orbitron", monospace;
      font-size: 36px;
      font-weight: 900;
      background: var(--accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { 
      font-size: 16px; 
      color: #a0a0cc; 
      font-weight: 500; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
    }

    .label { 
      font-size: 14px; 
      color: #b0b0d0; 
      margin-bottom: 12px; 
      font-weight: 600; 
      text-transform: uppercase; 
      display: block;
    }

    select {
      width: 100%; 
      padding: 20px 24px; 
      background: rgba(30,30,50,0.8); 
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px; 
      color: white; 
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer;
      margin-bottom: 24px;
    }

    .btn {
      width: 100%; 
      padding: 22px; 
      border: none; 
      border-radius: 24px;
      color: white; 
      font-family: "Orbitron", monospace; 
      font-weight: 800; 
      font-size: 18px; 
      cursor: pointer; 
      text-transform: uppercase;
      transition: all 0.3s ease;
      margin-top: 12px;
    }

    .btn-generate {
      background: var(--primary);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
    }

    .btn-generate:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(102, 126, 234, 0.7); }

    .btn-copy {
      background: var(--purple);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
      font-size: 17px;
    }

    .btn-copy:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.7); }

    .result-box {
      background: rgba(25,25,45,0.95); 
      border-radius: 24px; 
      padding: 36px; 
      margin-top: 36px;
      border: 2px solid #4facfe; 
      display: none;
      animation: fadeIn 0.6s ease;
    }

    .result-box.show { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sensi-item { 
      display: flex; 
      justify-content: space-between; 
      padding: 18px 0; 
      border-bottom: 1px solid rgba(255,255,255,0.08); 
    }

    .s-name { color: #b0b0d0; font-weight: 600; }
    .s-val { 
      color: #00f2fe; 
      font-family: "Orbitron", monospace; 
      font-weight: 900; 
      font-size: 28px; 
    }

    .dpi-card { 
      background: rgba(79,172,254,0.15); 
      padding: 24px; 
      border-radius: 20px; 
      margin-top: 28px; 
      text-align: center; 
      border: 1px solid #4facfe; 
      font-weight: 700;
      font-size: 18px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: white;
      padding: 14px 24px;
      border-radius: 9999px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 1000;
      opacity: 0;
      transition: all 0.4s ease;
      display: none;
    }

    .timer {
      text-align: center;
      margin: 20px 0;
      color: #10b981;
      font-weight: 700;
      font-size: 15px;
    }
  </style>
</head>

<body>

    <select id="brand">

    <button class="btn btn-generate" id="generateBtn">
      ⚡ Gerar Sensibilidade PRO
    </button>

    <div id="resultBox" class="result-box">
      <h2 id="res-model" style="text-align:center; margin-bottom:24px; color:#67e8f9;">📱</h2>

      <div class="sensi-item"><span class="s-name">GERAL</span><span class="s-val" id="res-g">0</span></div>
      <div class="sensi-item"><span class="s-name">PONTO VERMELHO</span><span class="s-val" id="res-r">0</span></div>
      <div class="sensi-item"><span class="s-name">MIRA 2X</span><span class="s-val" id="res-2">0</span></div>
      <div class="sensi-item"><span class="s-name">MIRA 4X</span><span class="s-val" id="res-4">0</span></div>
      <div class="sensi-item"><span class="s-name">MIRA AWM</span><span class="s-val" id="res-a">0</span></div>
      <div class="sensi-item"><span class="s-name">CÂMERA LIVRE</span><span class="s-val" id="res-c">0</span></div>

      <div class="dpi-card" id="res-dpi">DPI RECOMENDADA: 0</div>
      
      <div id="timer" class="timer">⏳ Aguarde...</div>

      <button class="btn btn-copy" onclick="copyConfig()">📋 Copiar Configuração PRO</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ==================== DATABASE ====================

        "Galaxy A31","Galaxy A32","Galaxy A33","Galaxy A34","Galaxy A35","Galaxy A50",
        "Galaxy A51","Galaxy A52","Galaxy A53","Galaxy A54","Galaxy A55","Galaxy S20 FE",

      ],

        "Poco F5","Poco F6"

        "Realme C33","Realme C35","Realme C53","Realme C55","Realme C61","Realme C63",
        "Realme C71","Realme C75","Realme Narzo 50","Realme Narzo 60"

        "Note 30 Pro","Zero 5G","Zero 30"
      ],
      lg: [
        "LG K8","LG K9","LG K10","LG K11","LG K12","LG K20","LG K22","LG K30","LG K31",
        "LG K32","LG K40","LG K41","LG K42","LG K50","LG K51","LG K52","LG K61",
        "LG Stylo 6","LG Velvet","LG Wing"
      ],
      apple: [

        "iPhone 14","iPhone 15","iPhone 15 Pro Max","iPhone 16","iPhone 16 Pro Max"
      ],
      zte: [
        "Nubia V60", "Nubia Red Magic 9 Pro", "Nubia Red Magic 8 Pro", "Nubia Red Magic 7",
        "Nubia Z60", "ZTE Axon 40 Ultra", "Nubia V50"

      oppo: [

        "Oppo A76", "Oppo A77", "Oppo A78", "Oppo A95", "Oppo Find X3", "Oppo Find X5",

      ],

        "Vivo Y35", "Vivo Y55", "Vivo Y75", "Vivo V21", "Vivo V23", "Vivo V25", "Vivo X60",
        "Vivo X70", "Vivo X80", "Vivo iQOO Neo 6"
      ],
      huawei: [
        "Huawei P30", "Huawei P40", "Huawei P50", "Huawei P60", "Huawei Mate 20",
        "Huawei Mate 40", "Huawei Mate 50", "Huawei Nova 8", "Huawei Nova 9",
        "Huawei Nova 10", "Huawei Nova Y90", "Huawei Y9 2019", "Huawei Y7a",
        "Honor 8X", "Honor 9X", "Honor 10", "Honor 50", "Honor 70", "Honor X8", "Honor X9a"
      ],
      asus: [
        "Asus Zenfone 8", "Asus Zenfone 9", "Asus Zenfone 10", "Asus Zenfone Max M2",
        "Asus Zenfone Max Pro M2", "Asus ROG Phone 5", "Asus ROG Phone 6", "Asus ROG Phone 7"
      ],
      google: [
        "Google Pixel 4", "Google Pixel 4a", "Google Pixel 5", "Google Pixel 5a",
        "Google Pixel 6", "Google Pixel 6 Pro", "Google Pixel 6a", "Google Pixel 7",
        "Google Pixel 7 Pro", "Google Pixel 7a", "Google Pixel 8", "Google Pixel 8 Pro",
        "Google Pixel 8a"
      ],
      oneplus: [
        "OnePlus 7", "OnePlus 7 Pro", "OnePlus 8", "OnePlus 8 Pro", "OnePlus 9",
        "OnePlus 9 Pro", "OnePlus 10 Pro", "OnePlus 11", "OnePlus 12",
        "OnePlus Nord", "OnePlus Nord 2", "OnePlus Nord CE"
      ],
      sony: [
        "Sony Xperia 1 III", "Sony Xperia 1 IV", "Sony Xperia 5 III", "Sony Xperia 5 IV",
        "Sony Xperia 10 III", "Sony Xperia 10 IV"
      ],
      tecno: [
        "Tecno Spark 7", "Tecno Spark 8", "Tecno Spark 9", "Tecno Spark 10",
        "Tecno Camon 17", "Tecno Camon 18", "Tecno Camon 19", "Tecno Camon 20",
        "Tecno Pova 3", "Tecno Pova 4"
      ],
      lenovo: [
        "Lenovo K10 Note", "Lenovo K12", "Lenovo K12 Pro", "Lenovo Legion Phone Duel",
        "Lenovo Legion 2 Pro"
      ],
      nokia: [
        "Nokia 2.3", "Nokia 2.4", "Nokia 3.4", "Nokia 5.3", "Nokia 5.4",
        "Nokia 6.2", "Nokia 7.2", "Nokia 8.3", "Nokia XR20", "Nokia G20",
        "Nokia G21", "Nokia G22"
      ],
      positivo: [
        "Positivo Q20", "Positivo Q30", "Positivo Q40", "Positivo Q60", "Positivo Q70",
        "Positivo Twist 4", "Positivo S330"
      ],
      multilaser: [
        "Multilaser E", "Multilaser G", "Multilaser H", "Multilaser MS80",
        "Multilaser MS60", "Multilaser MS45"
      ]
    };

    // ==================== ELEMENTOS ====================
    const brandSelect = document.getElementById('brand');
    const modelSelect = document.getElementById('model');
    const generateBtn = document.getElementById('generateBtn');
    const resultBox = document.getElementById('resultBox');
    const timerEl = document.getElementById('timer');
    const toastEl = document.getElementById('toast');

    let timerInterval = null;
    let cooldownEndTime = null;

    // ==================== TOAST ====================
    function showToast(message, type = "success") {
      toastEl.textContent = message;
      toastEl.style.display = "block";
      toastEl.style.opacity = "1";
      
      setTimeout(() => {
        toastEl.style.opacity = "0";
        setTimeout(() => toastEl.style.display = "none", 400);
      }, 3000);
    }

    // ==================== CARREGAR MODELOS ====================
    function loadModels() {
      const brand = brandSelect.value;
      modelSelect.innerHTML = '<option value="">Selecione o modelo...</option>';
      modelSelect.disabled = !brand;

      if (brand && database[brand]) {
        database[brand].sort().forEach(m => {
          modelSelect.innerHTML += `<option value="${m}">${m}</option>`;
        });
      }
      resultBox.classList.remove('show');
    }

    // ==================== DPI RECOMENDADA ====================
    function getRecommendedDPI(brand, model) {
      const m = model.toLowerCase();
      
      if (brand === "samsung") return m.includes("s23") || m.includes("s24") || m.includes("ultra") ? "800" : "720";
      if (brand === "xiaomi") return m.includes("poco") || m.includes("note") ? "900" : "800";
      if (brand === "realme") return "800";
      if (brand === "motorola") return "720";
      if (brand === "infinix") return "760";
      if (brand === "lg") return "600";
      if (brand === "apple") return "880";
      if (brand === "zte") return "800";
      
      // Novas marcas
      if (brand === "oppo") return "800";
      if (brand === "vivo") return "780";
      if (brand === "huawei") return "850";
      if (brand === "asus" && m.includes("rog")) return "900";
      if (brand === "asus") return "800";
      if (brand === "google") return "830";
      if (brand === "oneplus") return "850";
      if (brand === "sony") return "700";
      if (brand === "tecno") return "760";
      if (brand === "lenovo") return "720";
      if (brand === "nokia") return "740";
      if (brand === "positivo") return "680";
      if (brand === "multilaser") return "650";
      
      return "720";
    }

    // ==================== GERAR SENSIBILIDADE ====================
    function generateSensi() {
      const brand = brandSelect.value;
      const model = modelSelect.value;

      if (!brand || !model) {
        showToast("❌ Selecione marca e modelo!", "error");
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = "⚡ Gerando...";

      setTimeout(() => {
        const agora = Date.now();
        const cooldown = 5 * 60 * 1000;
        const key = "sensi_v2" + model;
        const registro = JSON.parse(localStorage.getItem(key));

        let valores;

        if (registro && (agora - registro.dataGerada) < cooldown) {
          valores = registro.valores;
          cooldownEndTime = registro.dataGerada + cooldown;
          showToast("🔄 Sensibilidade anterior carregada");
        } else {
          let seed = model.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
          seed += Math.floor(agora / cooldown);

          const getVal = (min, max, offset) => Math.floor(((seed * offset) % (max - min + 1)) + min);

          valores = {
            g: getVal(188, 200, 3),
            r: getVal(182, 196, 7),
            m2: getVal(192, 200, 4),
            m4: getVal(188, 200, 2),
            awm: getVal(40, 60, 9),
            cam: getVal(160, 200, 5),
            dpi: getRecommendedDPI(brand, model)
          };

          localStorage.setItem(key, JSON.stringify({ dataGerada: agora, valores }));
          cooldownEndTime = agora + cooldown;
          showToast("✅ Nova sensibilidade gerada!");
        }

        exibirResultados(valores, model);
        startRealTimeTimer();
        
      }, 1100);
    }

    // ==================== EXIBIR RESULTADOS ====================
    function exibirResultados(v, model) {
      document.getElementById("res-model").innerText = "📱 " + model;

      document.getElementById("res-g").innerText = v.g;
      document.getElementById("res-r").innerText = v.r;
      document.getElementById("res-2").innerText = v.m2;
      document.getElementById("res-4").innerText = v.m4;
      document.getElementById("res-a").innerText = v.awm;
      document.getElementById("res-c").innerText = v.cam;
      document.getElementById("res-dpi").innerText = `⚡ DPI RECOMENDADA: ${v.dpi}`;

      resultBox.classList.add("show");
    }

    // ==================== CRONÔMETRO EM TEMPO REAL ====================
    function startRealTimeTimer() {
      if (timerInterval) clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        if (!cooldownEndTime) return;

        const agora = Date.now();
        const restante = cooldownEndTime - agora;

        if (restante <= 0) {
          timerEl.innerHTML = "✅ Você pode gerar novamente!";
          generateBtn.disabled = false;
          generateBtn.textContent = "⚡ Gerar Novamente";
          clearInterval(timerInterval);
          return;
        }

        generateBtn.disabled = true;
        const minutos = Math.floor((restante % (1000 * 60 * 60)) / (1000 * 60));
        const segundos = Math.floor((restante % (1000 * 60)) / 1000);

        timerEl.innerHTML = `⏰ Aguarde: <strong>${minutos}m ${segundos}s</strong>`;
        generateBtn.textContent = `Aguarde ${minutos}m ${segundos}s`;
      }, 1000);
    }

    // ==================== COPIAR CONFIG ====================
    function copyConfig() {
      const model = modelSelect.value;
      const texto = `⚡ NIEL REALSENSI PRO
📱 DISPOSITIVO: ${model}

🎛️ GERAL: ${document.getElementById("res-g").innerText}
🔴 RED DOT: ${document.getElementById("res-r").innerText}
2️⃣ MIRA 2X: ${document.getElementById("res-2").innerText}
4️⃣ MIRA 4X: ${document.getElementById("res-4").innerText}
🎯 AWM: ${document.getElementById("res-a").innerText}
📷 CÂMERA: ${document.getElementById("res-c").innerText}

${document.getElementById("res-dpi").innerText}
⚙️ BOTÃO DIREITO: 47%

✨ Gerado por NIEL REALSENSI PRO OFICIAL`;

      navigator.clipboard.writeText(texto).then(() => {
        showToast("✅ Configuração copiada com sucesso!");
      });
    }

    // ==================== INICIALIZAÇÃO ====================
    brandSelect.addEventListener("change", loadModels);
    generateBtn.addEventListener("click", generateSensi);

    setTimeout(() => {
      showToast("👋 Selecione marca e modelo para começar!", "success");
    }, 800);
  </script>
