<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIEL REALSENSI - OFICIAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #050505;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #0d0d0d;
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.4);
            max-width: 480px;
            width: 100%;
            padding: 35px;
            border: 1px solid #222;
            text-align: center;
        }

        .neon-title {
            font-size: 34px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2, 0 0 40px #8a2be2;
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2, 0 0 30px #8a2be2; }
            to { text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff, 0 0 60px #ff00ff; }
        }

        .section { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }

        select {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }
        select:focus { border-color: #8a2be2; }

        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #8a2be2, #ff00ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .result-box {
            background: #151515;
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid #8a2be2;
            display: none;
        }

        .sensi-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }
        .s-name { color: #aaa; font-size: 14px; font-weight: 600; }
        .s-val { color: #00ff00; font-weight: 900; font-size: 20px; }

        .dpi-card {
            background: #222;
            color: #ff00ff;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 900;
        }

        .btn-copy {
            width: 100%;
            padding: 15px;
            background: #333;
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="neon-title">NIEL REALSENSI</div>
    
    <div class="section">
        <label>Selecione a Marca</label>
        <select id="brand" onchange="loadModels()">
            <option value="">Escolha uma marca...</option>
            <option value="samsung">SAMSUNG</option>
            <option value="motorola">MOTOROLA</option>
            <option value="xiaomi">XIAOMI / POCO</option>
            <option value="apple">APPLE (iPhone)</option>
            <option value="infinix">INFINIX</option>
            <option value="realme">REALME</option>
        </select>
    </div>

    <div class="section">
        <label>Modelo do Aparelho</label>
        <select id="model">
            <option value="">Aguardando marca...</option>
        </select>
    </div>

    <button class="btn-generate" onclick="generateSensi()">Gerar Sensibilidade VIP</button>

    <div id="resultBox" class="result-box">
        <div class="sensi-item"><span class="s-name">GERAL</span><span class="s-val" id="res-g">0</span></div>
        <div class="sensi-item"><span class="s-name">PONTO VERMELHO</span><span class="s-val" id="res-r">0</span></div>
        <div class="sensi-item"><span class="s-name">MIRA 2X</span><span class="s-val" id="res-2">0</span></div>
        <div class="sensi-item"><span class="s-name">MIRA 4X</span><span class="s-val" id="res-4">0</span></div>
        <div class="sensi-item"><span class="s-name">MIRA AWM</span><span class="s-val" id="res-a">0</span></div>
        <div class="sensi-item"><span class="s-name">CÂMERA LIVRE</span><span class="s-val" id="res-c">0</span></div>
        
        <div class="dpi-card" id="res-dpi">DPI RECOMENDADA: 0</div>
        
        <button class="btn-copy" onclick="copyConfig()">📋 COPIAR CONFIGURAÇÃO</button>
    </div>
</div>

<script>
    // Banco de Dados com os modelos "s" incluídos
    const database = {
        samsung: [
            "Galaxy A01", "Galaxy A01 Core", "Galaxy A10", "Galaxy A10s", "Galaxy A11", "Galaxy A12", 
            "Galaxy A20", "Galaxy A20s", "Galaxy A21s", "Galaxy A22", "Galaxy A30", "Galaxy A30s", 
            "Galaxy A31", "Galaxy A32", "Galaxy A50", "Galaxy A50s", "Galaxy A51", "Galaxy A52", 
            "Galaxy A53", "Galaxy A54", "Galaxy A70", "Galaxy A70s", "Galaxy A71", "Galaxy A73", 
            "Galaxy S20 FE", "Galaxy S21", "Galaxy S23 Ultra", "Galaxy M54"
        ],
        motorola: ["Moto E7", "Moto G6 Play", "Moto G8 Power", "Moto G9 Plus", "Moto G22", "Moto G30", "Moto G60", "Moto G73", "Moto Edge 30", "Moto G200"],
        xiaomi: ["Redmi 9", "Redmi 10", "Redmi 12", "Redmi Note 8", "Redmi Note 10", "Redmi Note 11", "Redmi Note 12", "Redmi Note 13", "Poco X3 Pro", "Poco X5 Pro", "Poco X6 Pro", "Poco F5"],
        apple: ["iPhone 7 Plus", "iPhone 8 Plus", "iPhone X", "iPhone XR", "iPhone 11", "iPhone 12 Pro Max", "iPhone 13 Pro Max", "iPhone 14 Pro Max", "iPhone 15 Pro Max"],
        infinix: ["Hot 11", "Hot 20i", "Hot 30i", "Note 30 5G"],
        realme: ["Realme 7", "Realme 8 Pro", "Realme 9i", "Realme C55", "Realme GT Edition"]
    };

    function loadModels() {
        const brand = document.getElementById('brand').value;
        const mSelect = document.getElementById('model');
        mSelect.innerHTML = brand ? '' : '<option>Aguardando marca...</option>';
        if(brand) {
            database[brand].forEach(m => {
                mSelect.innerHTML += `<option value="${m}">${m}</option>`;
            });
        }
        document.getElementById('resultBox').style.display = 'none';
    }

    function generateSensi() {
        const model = document.getElementById('model').value;
        if(!model || model.includes("Aguardando")) return alert("Selecione um modelo!");

        // Gerador de valores aleatórios dentro de uma faixa ideal (Escala 200)
        let g = Math.floor(Math.random() * (198 - 180 + 1)) + 180;
        let r = g - 8;
        let m2 = Math.min(g + 5, 200);
        
        document.getElementById('res-g').innerText = g;
        document.getElementById('res-r').innerText = r;
        document.getElementById('res-2').innerText = m2;
        document.getElementById('res-4').innerText = g - 3;
        document.getElementById('res-a').innerText = Math.floor(Math.random() * (50 - 35 + 1)) + 35;
        document.getElementById('res-c').innerText = Math.floor(Math.random() * (200 - 160 + 1)) + 160;
        document.getElementById('res-dpi').innerText = "DPI RECOMENDADA: " + (g > 185 ? "720" : "580");

        document.getElementById('resultBox').style.display = 'block';
    }

    function copyConfig() {
        const g = document.getElementById('res-g').innerText;
        const texto = `💎 NIEL REALSENSI 💎\n\nGERAL: ${g}\nRED DOT: ${document.getElementById('res-r').innerText}\nMira 2x: ${document.getElementById('res-2').innerText}\nMira 4x: ${document.getElementById('res-4').innerText}\n${document.getElementById('res-dpi').innerText}\nBOTÃO: 47%`;

        const area = document.createElement("textarea");
        area.value = texto;
        area.style.position = "fixed";
        document.body.appendChild(area);
        area.select();
        
        try {
            document.execCommand("copy");
            alert("✅ Configuração Copiada!");
        } catch (err) {
            alert("Erro ao copiar.");
        }
        document.body.removeChild(area);
    }
</script>

</body>
</html>
