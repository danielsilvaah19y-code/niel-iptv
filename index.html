<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIEL REALSENSI PRO - OFICIAL</title>
  <meta name="description" content="Gerador oficial de sensibilidade PRO para Free Fire Max" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap");

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --accent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --purple-neon: linear-gradient(135deg, #8b5cf6, #a855f7, #c026d3);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    html, body {
      overflow-x: hidden;
      overflow-y: auto !important;
      min-height: 100vh;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(15, 15, 25, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      box-shadow: 0 32px 80px -20px rgba(0, 0, 0, 0.7);
      max-width: 520px;
      width: 100%;
      padding: 48px 40px 80px;
      border: 1px solid var(--glass-border);
    }

    .header { text-align: center; margin-bottom: 40px; }
    .logo { width: 100%; max-width: 200px; margin: 0 auto 24px; border-radius: 20px; filter: drop-shadow(0 20px 40px rgba(102, 126, 234, 0.4)); }
    
    .title {
      font-family: "Orbitron", monospace;
      font-size: 36px;
      font-weight: 900;
      background: var(--accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { font-size: 16px; color: #a0a0cc; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }

    .label { font-size: 14px; color: #b0b0d0; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; }

    select {
      width: 100%; padding: 20px 24px; background: rgba(30,30,50,0.8); border: 2px solid var(--glass-border);
      border-radius: 20px; color: white; font-size: 16px; font-weight: 600; cursor: pointer;
    }

    .btn-generate {
      width: 100%; 
      padding: 22px 32px; 
      background: var(--primary); 
      border: none; 
      border-radius: 24px;
      color: white; 
      font-family: "Orbitron", monospace; 
      font-weight: 800; 
      font-size: 18px; 
      cursor: pointer; 
      margin-top: 12px;
      text-transform: uppercase;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
      transition: all 0.3s ease;
    }

    .btn-generate:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.7);
    }

    .btn-copy {
      width: 100%; 
      padding: 20px 32px; 
      background: var(--purple-neon);
      border: none; 
      border-radius: 24px;
      color: white; 
      font-family: "Orbitron", monospace; 
      font-weight: 700; 
      font-size: 17px;
      cursor: pointer; 
      margin-top: 25px;
      text-transform: uppercase;
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
      transition: all 0.3s ease;
    }

    .btn-copy:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(139, 92, 246, 0.7);
    }

    .result-box {
      background: rgba(25,25,45,0.95); 
      border-radius: 24px; 
      padding: 36px; 
      margin-top: 36px;
      border: 2px solid #4facfe; 
      display: none;
    }
    .result-box.show { display: block; }

    .sensi-item { display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .s-name { color: #b0b0d0; font-weight: 600; }
    .s-val { color: #00f2fe; font-family: "Orbitron", monospace; font-weight: 900; font-size: 28px; }
    .dpi-card { background: rgba(79,172,254,0.15); padding: 24px; border-radius: 20px; margin-top: 28px; text-align: center; border: 1px solid #4facfe; }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <img src="https://i.ibb.co/ym3t7Jpf/fundo-vip.png" alt="Logo" class="logo" />
      <h1 class="title">NIEL REALSENSI</h1>
      <div class="subtitle">VERSÃO PRO • OFICIAL</div>
    </div>

    <div class="section">
      <label class="label">🔥 Selecione a Marca</label>
      <select id="brand">
        <option value="">Escolha uma marca...</option>
        <option value="samsung">SAMSUNG</option>
        <option value="motorola">MOTOROLA</option>
        <option value="xiaomi">XIAOMI / POCO</option>
        <option value="apple">APPLE (iPhone)</option>
        <option value="realme">REALME</option>
        <option value="infinix">INFINIX</option>
        <option value="lg">LG</option>
        <option value="zte">ZTE / NUBIA</option>
      </select>
    </div>

    <div class="section">
      <label class="label">📱 Modelo do Aparelho</label>
      <select id="model" disabled>
        <option value="">Aguardando marca...</option>
      </select>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generateSensi()">
      ⚡ Gerar Sensibilidade PRO
    </button>

    <div id="resultBox" class="result-box">
      <div class="sensi-item"><span class="s-name">GERAL</span><span class="s-val" id="res-g">0</span></div>
      <div class="sensi-item"><span class="s-name">PONTO VERMELHO</span><span class="s-val" id="res-r">0</span></div>
      <div class="sensi-item"><span class="s-name">MIRA 2X</span><span class="s-val" id="res-2">0</span></div>
      <div class="sensi-item"><span class="s-name">MIRA 4X</span><span class="s-val" id="res-4">0</span></div>
      <div class="sensi-item"><span class="s-name">MIRA AWM</span><span class="s-val" id="res-a">0</span></div>
      <div class="sensi-item"><span class="s-name">CÂMERA LIVRE</span><span class="s-val" id="res-c">0</span></div>

      <div class="dpi-card" id="res-dpi">DPI RECOMENDADA: 0</div>
      <div id="timer" style="text-align:center; margin-top:20px; color:#10b981; font-weight:700;"></div>

      <button class="btn-copy" onclick="copyConfig()">📋 Copiar Configuração PRO</button>
    </div>
  </div>

  <script>
    const database = {
      samsung: ["Galaxy A01","Galaxy A02","Galaxy A03","Galaxy A04","Galaxy A05","Galaxy A06","Galaxy A10","Galaxy A10s","Galaxy A11","Galaxy A12","Galaxy A13","Galaxy A14","Galaxy A15","Galaxy A16","Galaxy A20","Galaxy A20s","Galaxy A21","Galaxy A21s","Galaxy A22","Galaxy A23","Galaxy A24","Galaxy A25","Galaxy A30","Galaxy A30s","Galaxy A31","Galaxy A32","Galaxy A33","Galaxy A34","Galaxy A35","Galaxy A50","Galaxy A51","Galaxy A52","Galaxy A53","Galaxy A54","Galaxy A55","Galaxy S20 FE","Galaxy S21","Galaxy S23","Galaxy S23 Ultra","Galaxy S24","Galaxy S24 Ultra"],
      motorola: ["Moto E7","Moto E13","Moto E22","Moto G05","Moto G06","Moto G8 Play","Moto G9 Play","Moto G10","Moto G15","Moto G20","Moto G22","Moto G23","Moto G24","Moto G30","Moto G32","Moto G35","Moto G42","Moto G52","Moto G54","Moto G55","Moto G56","Moto G60","Moto G73","Moto G75","Moto G84","Moto G85","Moto G86","Moto Edge 30","Moto Edge 40"],
      xiaomi: ["Redmi 9","Redmi 9A","Redmi 10","Redmi 12","Redmi 12C","Redmi 13C","Redmi 14C","Redmi 15C","Redmi Note 8","Redmi Note 9","Redmi Note 10","Redmi Note 11","Redmi Note 12","Redmi Note 13","Redmi Note 13 Pro","Redmi Note 14","Redmi Note 14 Pro","Poco X3 Pro","Poco X5 Pro","Poco X6 Pro","Poco X7 Pro","Poco F5","Poco F6"],
      realme: ["Realme 7","Realme 7 Pro","Realme 8","Realme 8 Pro","Realme 9","Realme 9i","Realme 10","Realme 11","Realme 14 Pro+","Realme 15T","Realme C11","Realme C21","Realme C33","Realme C35","Realme C53","Realme C55","Realme C61","Realme C63","Realme C71","Realme C75","Realme Narzo 50","Realme Narzo 60"],
      infinix: ["Hot 10","Hot 11","Hot 12","Hot 20i","Hot 30i","Hot 40i","Note 12","Note 30","Note 30 Pro","Zero 5G","Zero 30"],
      lg: ["LG K8","LG K9","LG K10","LG K11","LG K12","LG K20","LG K22","LG K30","LG K31","LG K32","LG K40","LG K41","LG K42","LG K50","LG K51","LG K52","LG K61","LG Stylo 6","LG Velvet","LG Wing"],
      apple: ["iPhone 8","iPhone 8 Plus","iPhone X","iPhone 11","iPhone 12","iPhone 13","iPhone 14","iPhone 15","iPhone 15 Pro Max","iPhone 16","iPhone 16 Pro Max"],
      zte: ["Nubia V60", "Nubia Red Magic 9 Pro", "Nubia Red Magic 8 Pro", "Nubia Red Magic 7", "Nubia Z60", "ZTE Axon 40 Ultra", "Nubia V50"]
    };

    function getRecommendedDPI(brand, model) {
      const m = model.toLowerCase();
      if (brand === "samsung") return m.includes("s23") || m.includes("s24") || m.includes("ultra") ? "800" : "720";
      if (brand === "xiaomi") return m.includes("poco") || m.includes("note") ? "900" : "800";
      if (brand === "realme") return "800";
      if (brand === "motorola") return "720";
      if (brand === "infinix") return "760";
      if (brand === "lg") return "600";
      if (brand === "apple") return "880";
      if (brand === "zte") return "800";           // DPI para ZTE / Nubia
      return "720";
    }

    function loadModels() {
      const brand = document.getElementById("brand").value;
      const modelSelect = document.getElementById("model");
      modelSelect.innerHTML = brand ? '<option value="">Selecione o modelo...</option>' : '<option value="">Aguardando marca...</option>';
      modelSelect.disabled = !brand;

      if (brand && database[brand]) {
        database[brand].forEach(m => modelSelect.innerHTML += `<option value="${m}">${m}</option>`);
      }
      document.getElementById("resultBox").classList.remove("show");
    }

    function generateSensi() {
      const brand = document.getElementById("brand").value;
      const model = document.getElementById("model").value;

      if (!brand || !model) {
        alert("❌ Selecione marca e modelo!");
        return;
      }

      const btn = document.getElementById("generateBtn");
      const originalText = btn.innerHTML;
      btn.innerHTML = "⚡ Gerando...";
      btn.disabled = true;

      setTimeout(() => {
        const agora = Date.now();
        const cooldown = 8 * 60 * 60 * 1000;
        const registro = JSON.parse(localStorage.getItem("sensi_" + model));

        if (registro && (agora - registro.dataGerada) < cooldown) {
          exibirSensi(registro.valores);
          const tempoRestante = cooldown - (agora - registro.dataGerada);
          const horas = Math.floor(tempoRestante / (1000 * 60 * 60));
          const minutos = Math.floor((tempoRestante % (1000 * 60 * 60)) / (1000 * 60));
          document.getElementById("timer").innerText = `⏰ Próxima geração em: ${horas}h ${minutos}m`;
        } else {
          let seed = model.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
          seed += Math.floor(agora / cooldown);

          const getVal = (min, max, offset) => ((seed * offset) % (max - min + 1)) + min;

          const novosValores = {
            g: getVal(188, 200, 3),
            r: getVal(182, 196, 7),
            m2: getVal(192, 200, 4),
            m4: getVal(188, 200, 2),
            awm: getVal(40, 60, 9),
            cam: getVal(160, 200, 5),
            dpi: getRecommendedDPI(brand, model)
          };

          localStorage.setItem("sensi_" + model, JSON.stringify({ dataGerada: agora, valores: novosValores }));
          exibirSensi(novosValores);
          document.getElementById("timer").innerText = "✅ Nova sensibilidade gerada!";
        }

        btn.innerHTML = originalText;
        btn.disabled = false;
      }, 1200);
    }

    function exibirSensi(v) {
      document.getElementById("res-g").innerText = v.g;
      document.getElementById("res-r").innerText = v.r;
      document.getElementById("res-2").innerText = v.m2;
      document.getElementById("res-4").innerText = v.m4;
      document.getElementById("res-a").innerText = v.awm;
      document.getElementById("res-c").innerText = v.cam;
      document.getElementById("res-dpi").innerText = `⚡ DPI RECOMENDADA: ${v.dpi}`;
      document.getElementById("resultBox").classList.add("show");
    }

    function copyConfig() {
      const model = document.getElementById("model").value;
      const texto = `⚡ NIEL REALSENSI PRO
📱 DISPOSITIVO: ${model}

🎛️ GERAL: ${document.getElementById("res-g").innerText}
🔴 RED DOT: ${document.getElementById("res-r").innerText}
2️⃣ MIRA 2X: ${document.getElementById("res-2").innerText}
4️⃣ MIRA 4X: ${document.getElementById("res-4").innerText}
🎯 AWM: ${document.getElementById("res-a").innerText}
📷 CÂMERA: ${document.getElementById("res-c").innerText}

${document.getElementById("res-dpi").innerText}
⚙️ BOTÃO DIREITO: 47%

✨ Gerado por NIEL REALSENSI PRO OFICIAL`;

      navigator.clipboard.writeText(texto).then(() => alert("✅ Copiado com sucesso!"));
    }

    // Evento de mudança de marca
    document.getElementById("brand").addEventListener("change", loadModels);
  </script>
</body>
  </html>
