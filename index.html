<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NIEL IPTV</title>
  <style>
    :root{--red:#ff0000;--bg:#0a0a0a;--card:#151515;--accent:#00d2ff}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:#fff;font-family:Arial;padding-bottom:20px}
    header{padding:15px;background:#000;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:10;text-align:center}
    .logo{font-weight:900;color:var(--accent);font-size:24px;margin-bottom:10px}
    .search-box input{width:90%;max-width:400px;padding:12px;border-radius:25px;border:1px solid #333;background:#111;color:#fff;outline:none}
    
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:15px}
    .card{background:var(--card);border-radius:12px;padding:12px;text-align:center;border:1px solid #222;display:flex;flex-direction:column;gap:8px}
    .name{font-size:12px;font-weight:bold;color:#eee;height:35px;display:flex;align-items:center;justify-content:center}
    .play{background:var(--red);color:#fff;border:none;padding:12px;border-radius:8px;font-weight:800;cursor:pointer}
    
    #modal{position:fixed;inset:0;display:none;background:#000;z-index:9999;flex-direction:column}
    #modal.open{display:flex}
    .close-btn{padding:15px;background:var(--red);text-align:center;cursor:pointer;font-weight:bold}
    video{width:100%;height:100%;background:#000}
    @media(min-width:900px){.grid{grid-template-columns:repeat(5,1fr)}}
  </style>
</head>
<body>

<header>
  <div class="logo">NIEL IPTV</div>
  <div class="search-box">
    <input type="text" id="search" placeholder="🔍 Buscar canal..." onkeyup="filter()">
  </div>
</header>

<main class="grid" id="list"></main>

<div id="modal">
  <div class="close-btn" onclick="closeP()">✕ FECHAR CANAL</div>
  <video id="video" controls playsinline></video>
</div>

<script src="https://jsdelivr.net"></script>
<script>
  // LISTA LIMPA E DIRETA
  const canais = [
    {n:"Record News", u:"https://otteravision.com"},
    {n:"Jovem Pan News", u:"https://cloudfront.net"},
    {n:"Gloob", u:"https://opencaster.com"},
    {n:"Amazon Sat", u:"https://brasilstream.com.br"},
    {n:"Cabo Frio TV", u:"https://streamlock.net"},
    {n:"Canal Educação", u:"https://ebc.com.br"},
    {n:"Canal Gov", u:"https://ebc.com.br"},
    {n:"Canal Rural", u:"https://streamlock.net"},
    {n:"Novo Tempo", u:"https://novotempo.com"},
    {n:"Play TV", u:"https://mediastreaming.com.br"},
    {n:"Kuriakos Kids", u:"https://manasat.com"},
    {n:"IMPD TV", u:"https://nuvemplay.live"},
    {n:"1001 Noites", u:"https://jmvstream.com"},
    {n:"Alpha Channel", u:"https://streamlock.net"}
  ];

  const list = document.getElementById('list');
  const video = document.getElementById('video');
  const hls = new Hls();

  // Gera os botões
  canais.forEach(c => {
    list.innerHTML += `
      <div class="card" data-name="${c.n.toLowerCase()}">
        <div class="name">${c.n}</div>
        <button class="play" onclick="play('${c.u}')">ASSISTIR</button>
      </div>`;
  });

  function play(url) {
    document.getElementById('modal').classList.add('open');
    if (Hls.isSupported()) {
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else {
      video.src = url;
      video.play();
    }
  }

  function closeP() {
    document.getElementById('modal').classList.remove('open');
    video.pause();
    hls.detachMedia();
  }

  function filter() {
    let q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
      c.style.display = c.dataset.name.includes(q) ? "" : "none";
    });
  }
</script>
</body>
</html>
