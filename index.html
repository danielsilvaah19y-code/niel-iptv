<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NIEL IPTV</title>
  <link href="https://zencdn.net" rel="stylesheet" />
  <style>
    :root{--red:#ff0000;--bg:#0a0a0a;--card:#151515;--accent:#00d2ff}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:#fff;font-family:Arial;padding-bottom:20px}
    header{padding:15px;background:#000;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:10;text-align:center}
    .logo{font-weight:900;color:var(--accent);font-size:22px;margin-bottom:10px}
    .search-box{width:90%;max-width:400px;margin:5px auto}
    .search-box input{width:100%;padding:12px;border-radius:25px;border:1px solid #333;background:#111;color:#fff;outline:none}
    
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:15px}
    .card{background:var(--card);border-radius:12px;padding:15px;text-align:center;border:1px solid #222;display:flex;flex-direction:column;justify-content:space-between;min-height:150px}
    .name{font-size:13px;font-weight:bold;margin-bottom:10px;color:var(--accent)}
    .play{background:var(--red);color:#fff;border:none;padding:10px;border-radius:8px;width:100%;font-weight:800;cursor:pointer}
    
    #modal{position:fixed;inset:0;display:none;background:#000;z-index:9999;flex-direction:column}
    #modal.open{display:flex}
    .close{padding:15px;background:var(--red);text-align:center;cursor:pointer;font-weight:bold}
    .video-js{width:100% !important;height:calc(100vh - 50px) !important}
    @media(min-width:900px){.grid{grid-template-columns:repeat(5,1fr)}}
  </style>
</head>
<body>

<header>
  <div class="logo">NIEL IPTV</div>
  <div class="search-box">
    <input type="text" id="search" placeholder="🔍 Buscar canal..." onkeyup="filter()">
  </div>
</header>

</main>

<div id="modal">
  <div class="close" onclick="closeP()">✕ FECHAR CANAL</div>
  <video id="v-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
</div>

<script src="https://zencdn.net"></script>
<script>
  var player = videojs('v-player', {
    fluid: true,
    html5: { vhs: { overrideNative: true } }
  });

  function play(u) {
    document.getElementById('modal').classList.add('open');
    player.src({ type: 'application/x-mpegURL', src: u });
    player.play();
  }

  function closeP() {
    player.pause();
    document.getElementById('modal').classList.remove('open');
  }

  function filter() {
    let q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
      c.style.display = c.dataset.name.includes(q) ? "" : "none";
    });
  }
</script>
</body>
</html>
