<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIEL FILMES - OFICIAL</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: #000; padding: 20px 5%; display: flex; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo-niel { font-size: 32px; font-weight: 900; color: #00d2ff; text-transform: uppercase; text-shadow: 0 0 15px #00d2ff, 0 0 30px #00d2ff; margin-right: 30px; }
        nav { display: flex; gap: 20px; }
        .nav-btn { color: #aaa; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 14px; border: none; background: none; }
        .nav-btn.active { color: #fff; border-bottom: 2px solid #00d2ff; }
        .container { padding: 20px 5%; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .movie-card { background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .movie-card:hover { border-color: #00d2ff; transform: scale(1.02); }
        video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
        .card-info { padding: 12px; }
        .movie-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .movie-tag { font-size: 10px; color: #00d2ff; font-weight: bold; text-transform: uppercase; }
        .section { display: none; }
        .section.active { display: block; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="logo-niel">NIEL</div>
    <nav>
        <button id="btn-filmes" class="nav-btn active" onclick="show('filmes')">Filmes</button>
        <button id="btn-series" class="nav-btn" onclick="show('series')">Séries</button>
    </nav>
</header>

<div class="container">
    <div id="filmes" class="section active">
        <h2 style="font-size: 20px; margin-bottom: 20px; color: #00d2ff;">Lançamentos de Filmes (50)</h2>
        <div id="grid-filmes" class="grid"></div>
    </div>
    <div id="series" class="section">
        <h2 style="font-size: 20px; margin-bottom: 20px; color: #00d2ff;">Séries Originais (50)</h2>
        <div id="grid-series" class="grid"></div>
    </div>
</div>

<script>
    // RECONSTRUÇÃO DOS LINKS QUE VOCÊ MANDOU
    const pA = "https://googleapis.com"; // Parte fixa
    const pB = "bucket/sample/"; // Parte fixa 2

    const fBase = [
        "BigBuckBunny.mp4", "ElephantsDream.mp4", "Sintel.mp4", 
        "TearsOfSteel.mp4", "VolkswagenGTIReview.mp4"
    ];

    const sBase = [
        "ForBiggerBlazes.mp4", "ForBiggerEscapes.mp4", "ForBiggerFun.mp4", 
        "ForBiggerJoyrides.mp4", "ForBiggerMeltdowns.mp4"
    ];

    function render(idGrid, lista, label) {
        const container = document.getElementById(idGrid);
        let html = "";
        for (let i = 1; i <= 50; i++) {
            // Juntando Parte A + Parte B + Nome do Filme
            const urlCompleta = pA + pB + lista[i % lista.length];
            html += `
            <div class="movie-card">
                <video controls preload="none" poster="https://placeholder.com{label}+${i}">
                    <source src="${urlCompleta}" type="video/mp4">
                </video>
                <div class="card-info">
                    <div class="movie-tag">PREMIUM | 4K</div>
                    <div class="movie-title">${label} Especial #${i}</div>
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        document.querySelectorAll('video').forEach(v => v.pause());
    }

    // Inicializa o catálogo com 50 de cada
    render('grid-filmes', fBase, 'Filme');
    render('grid-series', sBase, 'Série');
</script>

</body>
</html>
