<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Global</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100vh;
        }

        .screen.active {
            display: flex;
        }

        #loginScreen {
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.5s ease;
        }

        .login-container h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .login-container p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .login-container input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }

        .login-container button:hover {
            transform: translateY(-2px);
        }

        #chatScreen {
            flex-direction: column;
            background: white;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.8em;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .exit-btn {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .exit-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        .message-user {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .message-content {
            background: white;
            padding: 12px 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            word-wrap: break-word;
            max-width: 70%;
            display: inline-block;
        }

        .message-time {
            font-size: 0.8em;
            color: #999;
            margin-top: 5px;
        }

        .message.own {
            text-align: right;
        }

        .message.own .message-content {
            background: #667eea;
            color: white;
        }

        .message.system {
            text-align: center;
            color: #999;
            font-style: italic;
            font-size: 0.9em;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .chat-input-area button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .chat-input-area button:hover {
            transform: translateY(-2px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .message-content {
                max-width: 90%;
            }
            .chat-header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <h1>🌍 Chat Global</h1>
            <p>Conecte-se com pessoas do mundo todo</p>
            <input 
                type="text" 
                id="nicknameInput" 
                placeholder="Digite seu apelido"
                maxlength="20"
            >
            <button onclick="enterChat()">Entrar no Chat</button>
        </div>
    </div>

    <div id="chatScreen" class="screen">
        <div class="chat-header">
            <h2>💬 Chat Global</h2>
            <div class="user-info">
                <span id="currentUser"></span>
                <button onclick="exitChat()" class="exit-btn">Sair</button>
            </div>
        </div>

        <div id="messagesContainer" class="messages-container"></div>

        <div class="chat-input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Digite sua mensagem..."
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        let currentNickname = '';
        let messages = [];
        const STORAGE_KEY = 'chatMessages_' + new Date().toDateString();

        // Carregar mensagens do localStorage
        function loadMessages() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                messages = JSON.parse(stored);
            }
        }

        // Salvar mensagens no localStorage
        function saveMessages() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }

        // Verificar novas mensagens a cada 300ms
        function checkForNewMessages() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const storedMessages = JSON.parse(stored);
                if (storedMessages.length > messages.length) {
                    messages = storedMessages;
                    refreshMessages();
                }
            }
        }

        setInterval(checkForNewMessages, 300);

        loadMessages();

        function enterChat() {
            const nickname = document.getElementById('nicknameInput').value.trim();

            if (!nickname) {
                alert('⚠️ Digite um apelido!');
                return;
            }

            if (nickname.length < 3) {
                alert('⚠️ O apelido deve ter pelo menos 3 caracteres');
                return;
            }

            currentNickname = nickname;

            // Adicionar mensagem de entrada
            messages.push({
                type: 'system',
                content: `👋 ${nickname} entrou no chat`,
                timestamp: new Date().toLocaleTimeString('pt-BR')
            });
            saveMessages();

            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('chatScreen').classList.add('active');
            document.getElementById('currentUser').textContent = `👤 ${nickname}`;

            refreshMessages();
            document.getElementById('messageInput').focus();
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            messages.push({
                type: 'message',
                nickname: currentNickname,
                content: message,
                timestamp: new Date().toLocaleTimeString('pt-BR')
            });

            saveMessages();
            refreshMessages();

            input.value = '';
            input.focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function refreshMessages() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            messages.forEach((msg) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.type === 'system' ? 'system' : (msg.nickname === currentNickname ? 'own' : '')}`;

                if (msg.type === 'system') {
                    messageDiv.innerHTML = `<div>${msg.content}</div>`;
                } else {
                    messageDiv.innerHTML = `
                        <div class="message-user">${msg.nickname}</div>
                        <div class="message-content">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${msg.timestamp}</div>
                    `;
                }

                container.appendChild(messageDiv);
            });

            container.scrollTop = container.scrollHeight;
        }

        function exitChat() {
            messages.push({
                type: 'system',
                content: `👋 ${currentNickname} saiu do chat`,
                timestamp: new Date().toLocaleTimeString('pt-BR')
            });
            saveMessages();

            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById('loginScreen').classList.add('active');
            document.getElementById('nicknameInput').value = '';
            currentNickname = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
