<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIEL REALSENSI VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505;
            
            /* USANDO SEU NOVO ARQUIVO: fundo_vip.png */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('fundo_vip.png');
            
            background-attachment: fixed;
            background-position: center center;
            background-repeat: no-repeat;
            
            /* ISSO AQUI TIRA AS PARTES PRETAS EM CIMA E EMBAIXO */
            background-size: cover; 
            
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(10, 10, 10, 0.8);
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.4);
            max-width: 420px;
            width: 100%;
            padding: 30px;
            border: 1px solid rgba(138, 43, 226, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .neon-title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-shadow: 0 0 15px #8a2be2, 0 0 30px #ff00ff;
        }

        .section { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }

        select {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #8a2be2, #ff00ff);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.5);
        }

        .result-box {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
            border: 1px solid #8a2be2;
            display: none;
        }

        .sensi-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .s-val { color: #00ff00; font-weight: 900; font-size: 20px; }

        .dpi-card {
            background: rgba(138, 43, 226, 0.2);
            color: #ff00ff;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-weight: 900;
            border: 1px dashed #ff00ff;
        }

        .timer-info { font-size: 11px; color: #ffcc00; margin-top: 15px; font-weight: bold; }

        .btn-copy {
            width: 100%;
            padding: 15px;
            background: #222;
            border-radius: 12px;
            color: white;
            margin-top: 15px;
            cursor: pointer;
            font-weight: 800;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="neon-title">NIEL REALSENSI VIP</div>
    
    <div class="section">
        <label>Selecione a Marca</label>
        <select id="brand" onchange="loadModels()">
            <option value="">Escolha...</option>
            <option value="samsung">SAMSUNG</option>
            <option value="motorola">MOTOROLA</option>
            <option value="xiaomi">XIAOMI</option>
            <option value="apple">APPLE</option>
        </select>
    </div>

    <div class="section">
        <label>Modelo do Celular</label>
        <select id="model"><option>Aguardando marca...</option></select>
    </div>

    <button class="btn-generate" onclick="generateSensi()">GERAR AGORA</button>

    <div id="resultBox" class="result-box">
        <div class="sensi-item"><span>GERAL</span><span class="s-val" id="res-g">0</span></div>
        <div class="sensi-item"><span>RED DOT</span><span class="s-val" id="res-r">0</span></div>
        <div class="sensi-item"><span>MIRA 2X</span><span class="s-val" id="res-2">0</span></div>
        <div class="sensi-item"><span>MIRA 4X</span><span class="s-val" id="res-4">0</span></div>
        <div class="dpi-card" id="res-dpi">DPI: 0</div>
        <div id="timer" class="timer-info"></div>
        <button class="btn-copy" onclick="copyConfig()">📋 COPIAR CONFIGURAÇÃO</button>
    </div>
</div>

<script>
    const database = {
        samsung: ["Galaxy A10s", "Galaxy A20s", "Galaxy A30s", "Galaxy A51", "Galaxy S23 Ultra"],
        motorola: ["Moto G22", "Moto G60", "Moto Edge 30"],
        xiaomi: ["Redmi Note 12", "Poco X5 Pro"],
        apple: ["iPhone 11", "iPhone 15 Pro Max"]
    };

    function loadModels() {
        const b = document.getElementById('brand').value;
        const m = document.getElementById('model');
        m.innerHTML = b ? '' : '<option>Aguardando marca...</option>';
        if(b) database[b].forEach(item => m.innerHTML += `<option value="${item}">${item}</option>`);
    }

    function generateSensi() {
        const model = document.getElementById('model').value;
        if(!model || model.includes("Aguardando")) return alert("⚠️ Selecione o modelo!");
        
        const agora = new Date().getTime();
        const tempo = 8 * 60 * 60 * 1000;
        let registro = JSON.parse(localStorage.getItem('sensi_' + model));

        if (registro && (agora - registro.dataGerada < tempo)) {
            aplicar(registro.valores);
            const falta = tempo - (agora - registro.dataGerada);
            document.getElementById('timer').innerText = `⏳ ATUALIZA EM: ${Math.floor(falta/(1000*60*60))}h ${Math.floor((falta%(1000*60*60))/(1000*60))}min`;
        } else {
            let seed = 0;
            for (let i = 0; i < model.length; i++) seed += model.charCodeAt(i);
            seed += Math.floor(agora / tempo);
            const getV = (min, max, off) => ((seed * off) % (max - min + 1)) + min;
            let novos = { g: getV(188, 200, 3), r: getV(182, 196, 7), m2: getV(192, 200, 4), m4: getV(188, 200, 2), dpi: (seed % 2 === 0) ? "720" : "600" };
            localStorage.setItem('sensi_' + model, JSON.stringify({dataGerada: agora, valores: novos}));
            aplicar(novos);
            document.getElementById('timer').innerText = "🔥 SENSI VIP ATUALIZADA!";
        }
        document.getElementById('resultBox').style.display = 'block';
    }

    function aplicar(v) {
        document.getElementById('res-g').innerText = v.g;
        document.getElementById('res-r').innerText = v.r;
        document.getElementById('res-2').innerText = v.m2;
        document.getElementById('res-4').innerText = v.m4;
        document.getElementById('res-dpi').innerText = "DPI RECOMENDADA: " + v.dpi;
    }

    function copyConfig() {
        const t = `💎 NIEL REALSENSI VIP 💎\nGERAL: ${document.getElementById('res-g').innerText}\nRED DOT: ${document.getElementById('res-r').innerText}\nDPI: ${document.getElementById('res-dpi').innerText}\nBOTÃO: 47%`;
        navigator.clipboard.writeText(t);
        alert("✅ Configuração Copiada!");
    }
</script>
</body>
</html>
