<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIEL REALSENSI - OFICIAL</title>
    <meta name="description" content="Gerador oficial de sensibilidade VIP para Free Fire">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Skip link para acessibilidade */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 6px;
            background: #8a2be2;
            color: white;
            padding: 8px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .skip-link:focus { top: 6px; }

        /* Gradiente animado */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.1) 0%, transparent 50%);
            animation: backgroundShift 15s ease infinite;
            z-index: -1;
        }

        @keyframes backgroundShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .container {
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            max-width: 480px;
            width: 100%;
            padding: 40px 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            animation: containerSlideIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transition: all 0.3s ease;
        }

        @keyframes containerSlideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container:hover {
            box-shadow: 
                0 35px 70px -12px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(138, 43, 226, 0.2);
            transform: translateY(-4px);
        }

        .top-image {
            width: 100%;
            max-width: 180px;
            height: auto;
            margin: 0 auto 28px;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: drop-shadow(0 10px 20px rgba(138, 43, 226, 0.3));
        }

        .top-image:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 20px 40px rgba(138, 43, 226, 0.4));
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0ff 50%, #c0c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
            position: relative;
            text-align: center;
        }

        .title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #8a2be2, #ff00ff);
            border-radius: 2px;
            transform: translateX(-50%);
            transition: width 0.3s ease;
        }

        .title:hover::after { width: 100px; }

        .section {
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .section:nth-of-type(1) { animation-delay: 0.1s; }
        .section:nth-of-type(2) { animation-delay: 0.2s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .label {
            display: block;
            font-size: 13px;
            color: #a0a0cc;
            margin-bottom: 10px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.2s ease;
        }

        .section:hover .label { color: #ffffff; }

        select {
            width: 100%;
            padding: 16px 20px;
            background: rgba(30, 30, 45, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23a0a0cc' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 16px center;
            background-repeat: no-repeat;
            background-size: 18px;
            padding-right: 50px;
        }

        select:hover {
            border-color: rgba(138, 43, 226, 0.5);
            background: rgba(30, 30, 45, 1);
            transform: translateY(-2px);
        }

        select:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 0 4px rgba(138, 43, 226, 0.1);
            transform: translateY(-2px);
        }

        /* ESTADO DE ERRO */
        select.error {
            border-color: #ef4444 !important;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn-generate {
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, #8a2be2 0%, #a855f7 50%, #8a2be2 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .btn-generate::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-generate:hover:not(:disabled)::before { left: 100%; }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(138, 43, 226, 0.3);
        }

        .btn-generate:active { transform: translateY(-1px); }

        /* ESTADO DISABLED */
        .btn-generate:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .result-box {
            background: rgba(25, 25, 40, 0.9);
            border-radius: 20px;
            padding: 28px;
            margin-top: 32px;
            border: 2px solid rgba(138, 43, 226, 0.3);
            display: none;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .result-box.show {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .sensi-item {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.4s ease;
        }

        .result-box.show .sensi-item:nth-child(1) { transition-delay: 0.1s; }
        .result-box.show .sensi-item:nth-child(2) { transition-delay: 0.15s; }
        .result-box.show .sensi-item:nth-child(3) { transition-delay: 0.2s; }
        .result-box.show .sensi-item:nth-child(4) { transition-delay: 0.25s; }
        .result-box.show .sensi-item:nth-child(5) { transition-delay: 0.3s; }
        .result-box.show .sensi-item:nth-child(6) { transition-delay: 0.35s; }

        .result-box.show .sensi-item {
            opacity: 1;
            transform: translateX(0);
        }

        .s-name { 
            color: #a0a0cc; 
            font-size: 15px; 
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .sensi-item:hover .s-name { color: #ffffff; }

        .s-val { 
            color: #10b981; 
            font-weight: 700; 
            font-size: 22px;
            transition: all 0.2s ease;
        }

        .sensi-item:hover .s-val {
            color: #34d399;
            transform: scale(1.05);
        }

        .dpi-card {
            background: rgba(138, 43, 226, 0.1);
            color: #ffffff;
            padding: 20px;
            border-radius: 16px;
            margin-top: 24px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(138, 43, 226, 0.3);
            transition: all 0.3s ease;
            text-align: center;
        }

        .dpi-card:hover {
            background: rgba(138, 43, 226, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.2);
        }

        .timer-info {
            font-size: 13px;
            color: #f59e0b;
            margin-top: 16px;
            font-weight: 500;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.8s forwards;
            text-align: center;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .btn-copy {
            width: 100%;
            padding: 16px 24px;
            background: rgba(30, 30, 45, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        .btn-copy:hover:not(.copied) {
            border-color: rgba(16, 185, 129, 0.5);
            background: rgba(16, 185, 129, 0.1);
            transform: translateY(-2px);
        }

        .btn-copy.copied {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.2);
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s linear infinite;
            margin-right: 12px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* MELHOR RESPONSIVIDADE */
        @media (max-width: 500px) {
            .container { padding: 32px 24px; margin: 10px; }
            .title { font-size: 28px; }
        }

        @media (max-width: 400px) {
            .container { padding: 24px 16px; }
            .title { font-size: 24px; }
            .top-image { max-width: 140px; }
            .s-val { font-size: 20px; }
        }

        /* PWA */
        @media (display-mode: standalone) {
            body { padding: 10px; }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Ir para conteúdo principal</a>

    <main id="main-content" tabindex="-1">
        <div class="container">
            <img src="https://i.ibb.co/ym3t7Jpf/fundo-vip.png" alt="Logo NIEL VIP" class="top-image" loading="lazy">
            
            <h1 class="title">NIEL REALSENSI</h1>
            
            <div class="section">
                <label class="label" for="brand">Selecione a Marca</label>
                <select id="brand" aria-describedby="brand-help">
                    <option value="">Escolha uma marca...</option>
                    <option value="samsung">SAMSUNG</option>
                    <option value="motorola">MOTOROLA</option>
                    <option value="xiaomi">XIAOMI / POCO</option>
                    <option value="apple">APPLE (iPhone)</option>
                    <option value="infinix">INFINIX</option>
                    <option value="realme">REALME</option>
                </select>
            </div>

            <div class="section">
                <label class="label" for="model">Modelo do Aparelho</label>
                <select id="model" aria-describedby="model-help" disabled>
                    <option value="">Aguardando marca...</option>
                </select>
            </div>

            <button class="btn-generate" id="generateBtn" onclick="generateSensi()" aria-live="polite">
                🎯 Gerar Sensibilidade VIP
            </button>

            <div id="resultBox" class="result-box" role="region" aria-live="polite">
                <div class="sensi-item">
                    <span class="s-name">GERAL</span>
                    <span class="s-val" id="res-g" aria-label="Sensibilidade Geral">0</span>
                </div>
                <div class="sensi-item">
                    <span class="s-name">PONTO VERMELHO</span>
                    <span class="s-val" id="res-r" aria-label="Sensibilidade Ponto Vermelho">0</span>
                </div>
                <div class="sensi-item">
                    <span class="s-name">MIRA 2X</span>
                    <span class="s-val" id="res-2" aria-label="Sensibilidade Mira 2X">0</span>
                </div>
                <div class="sensi-item">
                    <span class="s-name">MIRA 4X</span>
                    <span class="s-val" id="res-4" aria-label="Sensibilidade Mira 4X">0</span>
                </div>
                <div class="sensi-item">
                    <span class="s-name">MIRA AWM</span>
                    <span class="s-val" id="res-a" aria-label="Sensibilidade Mira AWM">0</span>
                </div>
                <div class="sensi-item">
                    <span class="s-name">CÂMERA LIVRE</span>
                    <span class="s-val" id="res-c" aria-label="Sensibilidade Câmera Livre">0</span>
                </div>
                
                <div class="dpi-card" id="res-dpi" aria-label="DPI Recomendada">DPI RECOMENDADA: 0</div>
                <div id="timer" class="timer-info" aria-live="polite"></div>
                
                <button class="btn-copy" onclick="copyConfig()" aria-label="Copiar configuração para área de transferência">
                    📋 Copiar Configuração
                </button>
                
                <img src="https://i.ibb.co/ym3t7Jpf/fundo-vip.png" alt="" class="top-image" style="margin-top: 24px; opacity: 0.7;">
            </div>
        </div>
    </main>

<script>
    const database = {
        samsung: ["Galaxy A01", "Galaxy A10s", "Galaxy A11", "Galaxy A12", "Galaxy A20s", "Galaxy A21s", "Galaxy A22", "Galaxy A30s", "Galaxy A31", "Galaxy A32", "Galaxy A50", "Galaxy A51", "Galaxy A52", "Galaxy A53", "Galaxy A54", "Galaxy S20 FE", "Galaxy S21", "Galaxy S23 Ultra"],
        motorola: ["Moto E7", "Moto G8 Play", "Moto G9 Plus", "Moto G22", "Moto G30", "Moto G60", "Moto G73", "Moto Edge 30"],
        xiaomi: ["Redmi 9", "Redmi 10", "Redmi 12", "Redmi Note 10", "Redmi Note 11", "Redmi Note 12", "Poco X3 Pro", "Poco X5 Pro", "Poco F5"],
        apple: ["iPhone 8 Plus", "iPhone X", "iPhone 11", "iPhone 12", "iPhone 13", "iPhone 14", "iPhone 15 Pro Max"],
        infinix: ["Hot 11", "Hot 20i", "Hot 30i", "Note 30"],
        realme: ["Realme 7", "Realme 8 Pro", "Realme 9i", "Realme C55"]
    };

    function loadModels() {
        const brand = document.getElementById('brand').value;
        const modelSelect = document.getElementById('model');
        
        modelSelect.innerHTML = brand ? '<option value="">Selecione o modelo...</option>' : '<option value="">Aguardando marca...</option>';
        modelSelect.disabled = !brand;
        
        if(brand && database[brand]) {
            database[brand].forEach(model => {
                modelSelect.innerHTML += `<option value="${model}">${model}</option>`;
            });
        }
        
        // Reset resultado
        document.getElementById('resultBox').classList.remove('show');
        updateGenerateButton();
    }

    function updateGenerateButton() {
        const brand = document.getElementById('brand').value;
        const model = document.getElementById('model').value;
        const btn = document.getElementById('generateBtn');
        
        btn.disabled = !brand || !model || model === "Selecione o modelo...";
    }

    function generateSensi() {
        const brand = document.getElementById('brand').value;
        const model = document.getElementById('model').value;
        
        // ✅ VALIDAÇÃO MELHORADA
        if(!brand || !model || model === "Selecione o modelo..." || model === "Aguardando marca...") {
            // Efeito visual de erro
            const modelSelect = document.getElementById('model');
            modelSelect.classList.add('error');
            setTimeout(() => modelSelect.classList.remove('error'), 2000);
            
            // Feedback de voz para acessibilidade
            speak('Por favor, selecione marca e modelo');
            return;
        }

        const btn = document.getElementById('generateBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="loading"></span>Gerando Sensi VIP...';
        btn.disabled = true;

        setTimeout(() => {
            const agora = new Date().getTime();
            const tempoEspera = 8 * 60 * 60 * 1000; // 8 horas
            
            let registro = JSON.parse(localStorage.getItem('sensi_' + model));

            if (registro && (agora - registro.dataGerada < tempoEspera)) {
                exibirSensi(registro.valores);
                const falta = tempoEspera - (agora - registro.dataGerada);
                const horasFalta = Math.floor(falta / (1000 * 60 * 60));
                const minutosFalta = Math.floor((falta % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('timer').innerText = `⏰ Próxima atualização em: ${horasFalta}h ${minutosFalta}m`;
            } else {
                let seed = 0;
                for (let i = 0; i < model.length; i++) { 
                    seed += model.charCodeAt(i); 
                }
                seed += Math.floor(agora / tempoEspera);

                const getVal = (min, max, offset) => ((seed * offset) % (max - min + 1)) + min;

                const novosValores = {
                    g: getVal(188, 200, 3),
                    r: getVal(182, 196, 7),
                    m2: getVal(192, 200, 4),
                    m4: getVal(188, 200, 2),
                    awm: getVal(40, 60, 9),
                    cam: getVal(160, 200, 5),
                    dpi: (seed % 2 === 0) ? "720" : "600"
                };

                if(model.toLowerCase().includes("s") || model.toLowerCase().includes("pro")) {
                    novosValores.dpi = (parseInt(novosValores.dpi) + 100).toString();
                }

                localStorage.setItem('sensi_' + model, JSON.stringify({
                    dataGerada: agora,
                    valores: novosValores
                }));

                exibirSensi(novosValores);
                document.getElementById('timer').innerText = "✅ Sensibilidade atualizada agora!";
            }

            btn.innerHTML = originalText;
            btn.disabled = false;
        }, 1500);
    }

    function exibirSensi(v) {
        document.getElementById('res-g').innerText = v.g;
        document.getElementById('res-r').innerText = v.r;
        document.getElementById('res-2').innerText = v.m2;
        document.getElementById('res-4').innerText = v.m4;
        document.getElementById('res-a').innerText = v.awm;
        document.getElementById('res-c').innerText = v.cam;
        document.getElementById('res-dpi').innerText = `🎯 DPI RECOMENDADA: ${v.dpi}`;
        document.getElementById('resultBox').classList.add('show');
    }

    async function copyConfig() {
        // ✅ BUG CORRIGIDO - Verifica se tem resultado
        if (!document.getElementById('resultBox').classList.contains('show')) {
            speak('Gere a sensibilidade primeiro');
            return;
        }

        const model = document.getElementById('model').value;
        const texto = `🎯 NIEL REALSENSI VIP
📱 DISPOSITIVO: ${model}

🎛️ GERAL: ${document.getElementById('res-g').innerText}
🔴 RED DOT: ${document.getElementById('res-r').innerText}
2️⃣ MIRA 2X: ${document.getElementById('res-2').innerText}
4️⃣ MIRA 4X: ${document.getElementById('res-4').innerText}
🎯 AWM: ${document.getElementById('res-a').innerText}
📷 CÂMERA: ${document.getElementById('res-c').innerText}

${document.getElementById('res-dpi').innerText}
⚙️ BOTÃO DIREITO: 47%

✨ Gerado por NIEL REALSENSI OFICIAL`;

        try {
            await navigator.clipboard.writeText(texto);
            const btn = event.target;
            btn.classList.add('copied');
            btn.innerHTML = '✅ Copiado com sucesso!';
            btn.setAttribute('aria-label', 'Configuração copiada');
            
            speak('Configuração copiada');
            
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = '📋 Copiar Configuração';
                btn.setAttribute('aria-label', 'Copiar configuração para área de transferência');
            }, 2000);
        } catch (err) {
            // Fallback para navegadores antigos
            const textArea = document.createElement('textarea');
            textArea.value = texto;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            speak('Configuração copiada');
        }
    }

    // Acessibilidade - Leitor de tela
    function speak(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.2;
            speechSynthesis.speak(utterance);
        }
    }

    // Event Listeners
    document.getElementById('brand').addEventListener('change', loadModels);
    document.getElementById('model').addEventListener('change', updateGenerateButton);

    // Inicialização
    updateGenerateButton();
</script>
</body>
    </html>
