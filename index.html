<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIEL REALSENSI PRO - OFICIAL</title>
  <meta name="description" content="Gerador oficial de sensibilidade PRO para Free Fire Max" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap");

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --accent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glow: rgba(138, 43, 226, 0.5);
    }

    /* FIX SCROLL MOBILE - CORRIGIDO */
    html, body {
      overflow-x: hidden;
      overflow-y: auto !important;
      height: auto !important;
      min-height: 100vh;
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      position: relative;
    }

    /* Partículas animadas */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(245, 87, 108, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(79, 172, 254, 0.15) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
      z-index: -2;
    }

    @keyframes float {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
      50% { transform: scale(1.1) rotate(180deg); opacity: 0.4; }
    }

    /* Grid animado */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 30s linear infinite;
      z-index: -1;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .skip-link {
      position: absolute;
      top: -40px;
      left: 6px;
      background: var(--accent);
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .skip-link:focus {
      top: 6px;
      transform: scale(1.05);
    }

    .container {
      background: rgba(15, 15, 25, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      box-shadow: 
        0 32px 80px -20px rgba(0, 0, 0, 0.7),
        0 0 0 1px var(--glass-border),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      max-width: 520px;
      width: 100%;
      max-height: 90vh !important;
      padding: 48px 40px 80px;
      border: 1px solid var(--glass-border);
      position: relative;
      animation: containerRise 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      transition: all 0.4s ease;
      overflow-y: auto !important;
      overflow-x: hidden;
    }

    /* Scrollbar customizada PREMIUM */
    .container::-webkit-scrollbar {
      width: 5px;
    }
    .container::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin: 10px 0;
    }
    .container::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #4facfe, #667eea);
      border-radius: 10px;
      transition: all 0.3s ease;
    }
    .container::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, #667eea, #4facfe);
      box-shadow: 0 0 10px rgba(79, 172, 254, 0.5);
    }

    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.6s;
    }

    .container:hover::before {
      left: 100%;
    }

    .container:hover {
      box-shadow: 
        0 48px 100px -20px rgba(0, 0, 0, 0.8),
        0 0 0 1px var(--accent),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transform: translateY(-8px);
    }

    @keyframes containerRise {
      0% {
        opacity: 0;
        transform: translateY(50px) scale(0.9);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Header Premium */
    .header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    .logo {
      width: 100%;
      max-width: 200px;
      height: auto;
      margin: 0 auto 24px;
      border-radius: 20px;
      filter: drop-shadow(0 20px 40px rgba(102, 126, 234, 0.4));
      animation: logoFloat 4s ease-in-out infinite;
      transition: all 0.4s ease;
    }

    .logo:hover {
      filter: drop-shadow(0 30px 60px rgba(102, 126, 234, 0.6));
      transform: scale(1.05);
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }

    .title {
      font-family: "Orbitron", monospace;
      font-size: 36px;
      font-weight: 900;
      background: var(--accent);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: -0.03em;
      position: relative;
      animation: titleShimmer 4s ease-in-out infinite;
    }

    @keyframes titleShimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .subtitle {
      font-size: 16px;
      color: #a0a0cc;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .section {
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(30px);
      animation: slideInUp 0.8s ease forwards;
    }

    .section:nth-child(2) { animation-delay: 0.2s; }
    .section:nth-child(3) { animation-delay: 0.3s; }

    @keyframes slideInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .label {
      display: block;
      font-size: 14px;
      color: #b0b0d0;
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      position: relative;
    }

    .label::after {
      content: "";
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 40px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      opacity: 0.5;
    }

    select {
      width: 100%;
      padding: 20px 24px;
      background: rgba(30, 30, 50, 0.8);
      border: 2px solid var(--glass-border);
      border-radius: 20px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24'%3e%3cpath stroke='%23a0a0cc' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m7 10 5 5 5-5'/%3e%3c/svg%3e");
      background-position: right 20px center;
      background-repeat: no-repeat;
      background-size: 20px;
      padding-right: 60px;
      position: relative;
      overflow: hidden;
    }

    select::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.6s;
    }

    select:hover::before {
      left: 100%;
    }

    select:hover {
      border-color: var(--accent);
      background: rgba(30, 30, 50, 1);
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(79, 172, 254, 0.2);
    }

    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.2);
      transform: translateY(-3px);
    }

    select.error {
      border-color: #ef4444 !important;
      animation: shake 0.6s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .btn-generate {
      width: 100%;
      padding: 22px 32px;
      background: var(--primary);
      border: none;
      border-radius: 24px;
      color: white;
      font-family: "Orbitron", monospace;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      margin-top: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .btn-generate::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.7s;
    }

    .btn-generate:hover:not(:disabled)::before {
      left: 100%;
    }

    .btn-generate:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 25px 50px rgba(102, 126, 234, 0.5);
    }

    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .result-box {
      background: rgba(25, 25, 45, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 36px;
      margin-top: 36px;
      border: 2px solid var(--accent);
      display: none;
      opacity: 0;
      transform: scale(0.92) translateY(30px);
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .result-box::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent);
      animation: progress 2s ease-out forwards;
    }

    @keyframes progress {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    .result-box.show {
      display: block;
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .sensi-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      opacity: 0;
      transform: translateX(-30px);
      transition: all 0.5s ease;
    }

    .result-box.show .sensi-item {
      opacity: 1;
      transform: translateX(0);
    }

    .result-box.show .sensi-item:nth-child(1) { transition-delay: 0.1s; }
    .result-box.show .sensi-item:nth-child(2) { transition-delay: 0.15s; }
    .result-box.show .sensi-item:nth-child(3) { transition-delay: 0.2s; }
    .result-box.show .sensi-item:nth-child(4) { transition-delay: 0.25s; }
    .result-box.show .sensi-item:nth-child(5) { transition-delay: 0.3s; }
    .result-box.show .sensi-item:nth-child(6) { transition-delay: 0.35s; }

    .s-name {
      color: #b0b0d0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .s-val {
      color: #00f2fe;
      font-family: "Orbitron", monospace;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .sensi-item:hover .s-name {
      color: white;
    }

    .sensi-item:hover .s-val {
      color: #4facfe;
      text-shadow: 0 0 20px rgba(79, 172, 254, 0.6);
      transform: scale(1.1);
    }

    .dpi-card {
      background: rgba(79, 172, 254, 0.15);
      color: white;
      padding: 24px;
      border-radius: 20px;
      margin-top: 28px;
      font-size: 16px;
      font-weight: 700;
      font-family: "Orbitron", monospace;
      border: 1px solid var(--accent);
      text-align: center;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .dpi-card::before {
      content: "⚡";
      position: absolute;
      font-size: 24px;
      top: 12px;
      right: 16px;
      opacity: 0.3;
    }

    .dpi-card:hover {
      background: rgba(79, 172, 254, 0.25);
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 40px rgba(79, 172, 254, 0.3);
    }

    .timer-info {
      font-size: 14px;
      color: #10b981;
      margin-top: 20px;
      font-weight: 700;
      opacity: 0;
      animation: fadeInGlow 0.8s ease 1s forwards;
      text-align: center;
      text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
    }

    @keyframes fadeInGlow {
      to {
        opacity: 1;
      }
    }

    .btn-copy {
      width: 100%;
      padding: 20px 32px;
      background: rgba(30, 30, 50, 0.8);
      border: 2px solid var(--glass-border);
      border-radius: 20px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      margin-top: 28px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .btn-copy::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(16,185,129,0.2), transparent);
      transition: left 0.6s;
    }

    .btn-copy:hover:not(.copied)::before {
      left: 100%;
    }

    .btn-copy:hover:not(.copied) {
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.15);
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(16, 185, 129, 0.3);
    }

    .btn-copy.copied {
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.3);
      animation: pulseGreen 1s ease;
    }

    @keyframes pulseGreen {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 1s linear infinite;
      margin-right: 16px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsividade PREMIUM */
    @media (max-width: 520px) {
      body {
        padding: 12px;
      }
      .container {
        max-height: 95vh !important;
        padding: 40px 28px 60px !important;
        margin: 0;
        border-radius: 24px;
      }
      .title {
        font-size: 32px;
      }
      .logo {
        max-width: 160px;
      }
    }

    @media (max-width: 400px) {
      .container {
        padding: 32px 20px 60px !important;
      }
      .title {
        font-size: 28px;
      }
      .s-val {
        font-size: 24px;
      }
    }

    /* Dark mode PWA */
    @media (prefers-color-scheme: dark), (display-mode: standalone) {
      body {
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <a href="#main-content" class="skip-link">Ir para conteúdo principal</a>

  <main id="main-content" tabindex="-1">
    <div class="container">
      <div class="header">
        <img
          src="https://i.ibb.co/ym3t7Jpf/fundo-vip.png"
          alt="Logo NIEL PRO"
          class="logo"
          loading="lazy"
        />
        <h1 class="title">NIEL REALSENSI</h1>
        <div class="subtitle">VERSÃO PRO • OFICIAL</div>
      </div>

      <div class="section">
        <label class="label" for="brand">🔥 Selecione a Marca</label>
        <select id="brand" aria-describedby="brand-help">
          <option value="">Escolha uma marca...</option>
          <option value="samsung">SAMSUNG</option>
          <option value="motorola">MOTOROLA</option>
          <option value="xiaomi">XIAOMI / POCO</option>
          <option value="apple">APPLE (iPhone)</option>
          <option value="infinix">INFINIX</option>
          <option value="realme">REALME</option>
        </select>
      </div>

      <div class="section">
        <label class="label" for="model">📱 Modelo do Aparelho</label>
        <select id="model" aria-describedby="model-help" disabled>
          <option value="">Aguardando marca...</option>
        </select>
      </div>

      <button
        class="btn-generate"
        id="generateBtn"
        onclick="generateSensi()"
        aria-live="polite"
      >
        ⚡ Gerar Sensibilidade PRO
      </button>

      <div id="resultBox" class="result-box" role="region" aria-live="polite">
        <div class="sensi-item">
          <span class="s-name">GERAL</span>
          <span class="s-val" id="res-g" aria-label="Sensibilidade Geral">0</span>
        </div>
        <div class="sensi-item">
          <span class="s-name">PONTO VERMELHO</span>
          <span class="s-val" id="res-r" aria-label="Sensibilidade Ponto Vermelho">0</span>
        </div>
        <div class="sensi-item">
          <span class="s-name">MIRA 2X</span>
          <span class="s-val" id="res-2" aria-label="Sensibilidade Mira 2X">0</span>
        </div>
        <div class="sensi-item">
          <span class="s-name">MIRA 4X</span>
          <span class="s-val" id="res-4" aria-label="Sensibilidade Mira 4X">0</span>
        </div>
        <div class="sensi-item">
          <span class="s-name">MIRA AWM</span>
          <span class="s-val" id="res-a" aria-label="Sensibilidade Mira AWM">0</span>
        </div>
        <div class="sensi-item">
          <span class="s-name">CÂMERA LIVRE</span>
          <span class="s-val" id="res-c" aria-label="Sensibilidade Câmera Livre">0</span>
        </div>

        <div class="dpi-card" id="res-dpi" aria-label="DPI Recomendada">
          DPI RECOMENDADA: 0
        </div>
        
        <div id="timer" class="timer-info" aria-live="polite"></div>

        <button class="btn-copy" onclick="copyConfig()" aria-label="Copiar configuração PRO">
          📋 Copiar Configuração PRO
        </button>
      </div>
    </div>
  </main>

  <script>
    // Mesmo código JavaScript da versão anterior (mantive funcionalidade idêntica)
    const database = {
      samsung: [
        "Galaxy A01", "Galaxy A10s", "Galaxy A11", "Galaxy A12", "Galaxy A20s",
        "Galaxy A21s", "Galaxy A22", "Galaxy A30s", "Galaxy A31", "Galaxy A32",
        "Galaxy A50", "Galaxy A51", "Galaxy A52", "Galaxy A53", "Galaxy A54",
        "Galaxy S20 FE", "Galaxy S21", "Galaxy S23 Ultra"
      ],
      motorola: [
        "Moto E7", "Moto G8 Play", "Moto G9 Plus", "Moto G22", "Moto G30",
        "Moto G60", "Moto G73", "Moto Edge 30"
      ],
      xiaomi: [
        "Redmi 9", "Redmi 10", "Redmi 12", "Redmi Note 10", "Redmi Note 11",
        "Redmi Note 12", "Poco X3 Pro", "Poco X5 Pro", "Poco F5"
      ],
      apple: [
        "iPhone 8 Plus", "iPhone X", "iPhone 11", "iPhone 12", "iPhone 13",
        "iPhone 14", "iPhone 15 Pro Max"
      ],
      infinix: ["Hot 11", "Hot 20i", "Hot 30i", "Note 30"],
      realme: ["Realme 7", "Realme 8 Pro", "Realme 9i", "Realme C55"]
    };

    function loadModels() {
      const brand = document.getElementById("brand").value;
      const modelSelect = document.getElementById("model");

      modelSelect.innerHTML = brand
        ? '<option value="">Selecione o modelo...</option>'
        : '<option value="">Aguardando marca...</option>';
      modelSelect.disabled = !brand;

      if (brand && database[brand]) {
        database[brand].forEach((model) => {
          modelSelect.innerHTML += `<option value="${model}">${model}</option>`;
        });
      }

      document.getElementById("resultBox").classList.remove("show");
      updateGenerateButton();
    }

    function updateGenerateButton() {
      const brand = document.getElementById("brand").value;
      const model = document.getElementById("model").value;
      const btn = document.getElementById("generateBtn");

      btn.disabled = !brand || !model || model === "Selecione o modelo...";
    }

    function generateSensi() {
      const brand = document.getElementById("brand").value;
      const model = document.getElementById("model").value;

      if (!brand || !model || model === "Selecione o modelo..." || model === "Aguardando marca...") {
        const modelSelect = document.getElementById("model");
        modelSelect.classList.add("error");
        setTimeout(() => modelSelect.classList.remove("error"), 2000);
        speak("Por favor, selecione marca e modelo");
        return;
      }

      const btn = document.getElementById("generateBtn");
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="loading"></span>Gerando Sensi PRO...';
      btn.disabled = true;

      setTimeout(() => {
        const agora = new Date().getTime();
        const tempoEspera = 8 * 60 * 60 * 1000;

        let registro = JSON.parse(localStorage.getItem("sensi_" + model));

        if (registro && agora - registro.dataGerada < tempoEspera) {
          exibirSensi(registro.valores);
          const falta = tempoEspera - (agora - registro.dataGerada);
          const horasFalta = Math.floor(falta / (1000 * 60 * 60));
          const minutosFalta = Math.floor((falta % (1000 * 60 * 60)) / (1000 * 60));
          document.getElementById("timer").innerText = `⏰ Próxima atualização em: ${horasFalta}h ${minutosFalta}m`;
        } else {
          let seed = 0;
          for (let i = 0; i < model.length; i++) {
            seed += model.charCodeAt(i);
          }
          seed += Math.floor(agora / tempoEspera);

          const getVal = (min, max, offset) =>
            ((seed * offset) % (max - min + 1)) + min;

          const novosValores = {
            g: getVal(188, 200, 3),
            r: getVal(182, 196, 7),
            m2: getVal(192, 200, 4),
            m4: getVal(188, 200, 2),
            awm: getVal(40, 60, 9),
            cam: getVal(160, 200, 5),
            dpi: seed % 2 === 0 ? "720" : "600",
          };

          if (model.toLowerCase().includes("s") || model.toLowerCase().includes("pro")) {
            novosValores.dpi = (parseInt(novosValores.dpi) + 100).toString();
          }

          localStorage.setItem(
            "sensi_" + model,
            JSON.stringify({
              dataGerada: agora,
              valores: novosValores,
            })
          );

          exibirSensi(novosValores);
          document.getElementById("timer").innerText = "✅ Sensibilidade PRO atualizada!";
        }

        btn.innerHTML = originalText;
        btn.disabled = false;
      }, 1800);
    }

    function exibirSensi(v) {
      document.getElementById("res-g").innerText = v.g;
      document.getElementById("res-r").innerText = v.r;
      document.getElementById("res-2").innerText = v.m2;
      document.getElementById("res-4").innerText = v.m4;
      document.getElementById("res-a").innerText = v.awm;
      document.getElementById("res-c").innerText = v.cam;
      document.getElementById("res-dpi").innerText = `⚡ DPI RECOMENDADA: ${v.dpi}`;
      document.getElementById("resultBox").classList.add("show");
    }

    async function copyConfig() {
      if (!document.getElementById("resultBox").classList.contains("show")) {
        speak("Gere a sensibilidade primeiro");
        return;
      }

      const model = document.getElementById("model").value;
      const texto = `⚡ NIEL REALSENSI PRO
📱 DISPOSITIVO: ${model}

🎛️ GERAL: ${document.getElementById("res-g").innerText}
🔴 RED DOT: ${document.getElementById("res-r").innerText}
2️⃣ MIRA 2X: ${document.getElementById("res-2").innerText}
4️⃣ MIRA 4X: ${document.getElementById("res-4").innerText}
🎯 AWM: ${document.getElementById("res-a").innerText}
📷 CÂMERA: ${document.getElementById("res-c").innerText}

${document.getElementById("res-dpi").innerText}
⚙️ BOTÃO DIREITO: 47%

✨ Gerado por NIEL REALSENSI PRO OFICIAL`;

      try {
        await navigator.clipboard.writeText(texto);
        const btn = event.target;
        btn.classList.add("copied");
        btn.innerHTML = "✅ Copiado com sucesso!";
        btn.setAttribute("aria-label", "Configuração PRO copiada");

        speak("Configuração PRO copiada");

        setTimeout(() => {
          btn.classList.remove("copied");
          btn.innerHTML = "📋 Copiar Configuração PRO";
          btn.setAttribute("aria-label", "Copiar configuração PRO");
        }, 2500);
      } catch (err) {
        const textArea = document.createElement("textarea");
        textArea.value = texto;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        document.body.removeChild(textArea);
        speak("Configuração PRO copiada");
      }
    }

    function speak(text) {
      if ("speechSynthesis" in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "pt-BR";
        utterance.rate = 1.2;
        speechSynthesis.speak(utterance);
      }
    }

    document.getElementById("brand").addEventListener("change", loadModels);
    document.getElementById("model").addEventListener("change", updateGenerateButton);
    updateGenerateButton();
  </script>
</body>
  </html>
